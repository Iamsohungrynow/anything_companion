<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>NextStep Companion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Live2D is loaded only when available locally; study chat should not preload external runtimes. -->
  <style>
    body{
      background:linear-gradient(135deg,#0f0c29 0%,#302b63 40%,#24243e 100%);
      background-attachment:fixed;min-height:100vh;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      -webkit-font-smoothing:antialiased;
    }
    /* ── Keyframes ── */
    @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    @keyframes float3d{
      0%,100%{transform:perspective(700px) rotateX(3deg) rotateY(0deg) translateY(0)}
      25%{transform:perspective(700px) rotateX(0deg) rotateY(8deg) translateY(-12px)}
      50%{transform:perspective(700px) rotateX(-2deg) rotateY(0deg) translateY(-6px)}
      75%{transform:perspective(700px) rotateX(0deg) rotateY(-8deg) translateY(-10px)}
    }
    @keyframes breathe{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.015)}}
    @keyframes talkWave{0%,100%{transform:scaleX(1) scaleY(1)}25%{transform:scaleX(1.04) scaleY(0.97)}50%{transform:scaleX(0.98) scaleY(1.03)}75%{transform:scaleX(1.02) scaleY(0.98)}}
    @keyframes glowPulse{0%,100%{box-shadow:0 0 20px rgba(139,92,246,0.4),0 0 60px rgba(139,92,246,0.15)}50%{box-shadow:0 0 40px rgba(139,92,246,0.7),0 0 100px rgba(139,92,246,0.35),0 0 160px rgba(168,85,247,0.2)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes bounceSoft{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
    @keyframes spinBtn{to{transform:rotate(360deg)}}
    @keyframes progressBar{from{width:0%}to{width:100%}}
    @keyframes particleDrift{0%{transform:translateY(0) translateX(0) scale(1);opacity:0.6}100%{transform:translateY(-120px) translateX(var(--dx,20px)) scale(0);opacity:0}}
    @keyframes audioBounce{0%,100%{height:4px}50%{height:var(--h,20px)}}
    @keyframes scanLine{0%{transform:translateY(-100%)}100%{transform:translateY(400%)}}
    @keyframes typingBounce{0%,80%,100%{transform:scale(0.6);opacity:.4}40%{transform:scale(1);opacity:1}}

    .anim-float{animation:floatY 3.5s ease-in-out infinite}
    .anim-float3d{animation:float3d 4s ease-in-out infinite}
    .anim-breathe{animation:breathe 3s ease-in-out infinite}
    .anim-talk{animation:talkWave 0.25s ease-in-out infinite}
    .anim-glow-pulse{animation:glowPulse 2s ease-in-out infinite}
    .anim-slide-up{animation:slideUp 0.4s ease-out both}
    .anim-fade-in{animation:fadeIn 0.45s ease-out both}
    .anim-bounce-soft{animation:bounceSoft 2.2s ease-in-out infinite}
    .anim-spin{animation:spinBtn 0.8s linear infinite}
    .msg-in{animation:fadeIn 0.3s ease-out both}
    .typing-dot{animation:typingBounce 1.2s ease-in-out infinite}
    .typing-dot:nth-child(2){animation-delay:.15s}
    .typing-dot:nth-child(3){animation-delay:.3s}

    /* Scrollbar */
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:rgba(139,92,246,0.4);border-radius:99px}
    ::-webkit-scrollbar-track{background:transparent}

    /* Glass cards */
    .glass{background:rgba(255,255,255,0.06);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.12)}
    .glass-light{background:rgba(255,255,255,0.04);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08)}
    .glass-bright{background:rgba(255,255,255,0.12);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.2)}

    /* ACG character portrait */
    .acg-portrait{image-rendering:auto;object-fit:contain;max-height:100%;filter:drop-shadow(0 0 32px rgba(139,92,246,0.6))}
    .acg-stage{position:relative;overflow:hidden}
    .acg-stage::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 100%,rgba(139,92,246,0.25) 0%,transparent 70%);pointer-events:none;z-index:1}

    /* Video mode ambient bg */
    .video-bg{background:radial-gradient(ellipse 80% 60% at 50% 70%,rgba(88,28,235,0.25) 0%,rgba(15,12,41,0.95) 70%)}

    /* Progress step */
    .step-done{color:#a78bfa;font-weight:700}
    .step-active{color:#fff;font-weight:800;text-shadow:0 0 12px rgba(167,139,250,0.8)}
    .step-pending{color:rgba(255,255,255,0.3)}

    /* Audio wave bars */
    .wave-bar{width:3px;border-radius:99px;background:linear-gradient(to top,#a78bfa,#7c3aed);transform-origin:bottom;animation:audioBounce 0.6s ease-in-out infinite}
    .wave-bar:nth-child(1){--h:12px;animation-delay:0s}
    .wave-bar:nth-child(2){--h:22px;animation-delay:.1s}
    .wave-bar:nth-child(3){--h:30px;animation-delay:.2s}
    .wave-bar:nth-child(4){--h:22px;animation-delay:.3s}
    .wave-bar:nth-child(5){--h:12px;animation-delay:.4s}

    /* Live2D canvas */
    #live2d-canvas{display:block}
    
    /* Scan line effect */
    .scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,rgba(139,92,246,0.6),transparent);animation:scanLine 4s linear infinite;pointer-events:none;z-index:5}
  </style>
</head>

function getMicroTaskPlan(result){
  if(Array.isArray(result?.micro_task_plan)&&result.micro_task_plan.length){
    return result.micro_task_plan.map((task,i)=>({
      label:task.label||String(task),
      duration_minutes:Number(task.duration_minutes)||[2,5,8,2][i]||5,
      done:Boolean(task.done),
    }));
  }
  return (Array.isArray(result?.micro_task)?result.micro_task:[]).map((label,i)=>({
    label:String(label),
    duration_minutes:[2,5,8,2][i]||5,
    done:false,
  }));
}

function getSprintMinutes(result){
  const taskTotal=(result?.micro_task_plan||[])
    .reduce((sum,task)=>sum+Math.max(0,Number(task?.duration_minutes||0)),0);
  if(Number.isFinite(taskTotal)&&taskTotal>0) return taskTotal;
  const label=result?.start_button_label||'';
  const match=label.match(/(\d+)\s*-\s*min|(\d+)\s*min/i);
  const fromLabel=Number(match?.[1]||match?.[2]);
  if(Number.isFinite(fromLabel)&&fromLabel>0) return fromLabel;
  return 10;
}

function getMicroTaskItems(result){
  const structured=(result?.micro_task_plan||[])
    .map((task,index)=>({
      label:String(task?.label||result?.micro_task?.[index]||`Step ${index+1}`),
      duration_minutes:Math.max(1,Number(task?.duration_minutes||0)||1),
    }))
    .filter(task=>task.label.trim());
  if(structured.length) return structured;
  const fallback=result?.micro_task||[];
  const fallbackMinutes=Math.max(1,Math.ceil(getSprintMinutes(result)/Math.max(1,fallback.length||1)));
  return fallback.map((label,index)=>({
    label:String(label||`Step ${index+1}`),
    duration_minutes:fallbackMinutes,
  }));
}

async function generateChatResult(companion, msg, channel='text', messages=[]) {
  if(FORCE_LOCAL_RUNTIME){
    return buildMarkedLocalFallback(companion,msg,messages,'Browser-only backup selected with ?runtime=local.');
  }
  try {
    const normalized = await requestRuntimeTurn({
      session_id:runtimeSessionId,
      scenario:companion.scenario,
      message:msg,
      channel,
      tone:companion.tone,
      role:companion.role,
      use_case:companion.use_case,
      companion,
      image_url:companion.sourceImageUrl,
      image_metadata:{
        visualMode:companion.visualMode,
        default_object_label:companion.default_object_label||'',
      },
      history:messages.slice(-6).map(m=>({
        role:m.role==='companion'?'assistant':'user',
        content:m.content,
      })),
    });
    logChatRuntime({...normalized, assistantText:getAssistantText(normalized)});
    return normalized;
  } catch (err) {
    console.warn('Chat API unavailable:', err);
    if(!ALLOW_LOCAL_FALLBACK){
      const unavailable = normalizeClientResult(buildRuntimeUnavailableResult(companion, msg));
      logChatRuntime({...unavailable, assistantText:getAssistantText(unavailable)});
      return unavailable;
    }
    console.warn('Using explicit localFallback demo runtime.');
    const markedFallback = buildMarkedLocalFallback(companion,msg,messages,'Browser could not reach /api/chat; explicit local fallback handled this turn.');
    return markedFallback;
  }
}

function buildMarkedLocalFallback(companion,msg,messages,summary){
  const fallback = normalizeClientResult(generateLocalChatResult(companion,msg,messages));
  const markedFallback = {
    ...fallback,
    fallback_used:true,
    runtime_source:'local_fallback',
    trace:[
      ...(fallback.trace||[]),
      {step:'client_api',status:'fallback',summary},
    ],
  };
  logChatRuntime({...markedFallback,assistantText:getAssistantText(markedFallback)});
  return markedFallback;
}

async function requestRuntimeTurn(payload){
  const res = await fetch('/api/chat', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload),
  });
  if (!res.ok) throw new Error(`chat ${res.status}`);
  const data = await res.json();
  runtimeSessionId = data.session_id || runtimeSessionId;
  return normalizeClientResult(data);
}

function buildRuntimeUnavailableResult(companion, msg){
  const subject = extractGoalSubject(msg) || extractConceptSubject(msg) || extractContinuationSubject(msg) || localActiveSubject || 'this task';
  const answer = `I cannot reach the backend AI runtime right now, so I will not fake a tutor answer for ${subject}. Refresh http://127.0.0.1:3017/nextstep-companion.html after the dev server is running, then send the message again.`;
  return {
    intent:'general_chat',
    answer,
    reply:answer,
    detected_state:'Backend AI runtime unavailable',
    companion_state:'concerned',
    mode:'Companion Presence Mode',

    teaching:{concept:'',explanation:'',example:'',check_question:''},
    suggested_actions:['Refresh 3017 page','Restart npm run dev','Send again'],

      {label:'Confirm the URL is http://127.0.0.1:3017/nextstep-companion.html',duration_minutes:1,done:false},
      {label:'Restart the local dev server if needed',duration_minutes:1,done:false},

    trace:[{step:'client_api',status:'error',summary:'Browser could not reach /api/chat; no local tutor fallback was used.'}],

function normalizeClientResult(res){
  const plan = Array.isArray(res.micro_task_plan) && res.micro_task_plan.length
    ? res.micro_task_plan
    : (Array.isArray(res.micro_task)?res.micro_task:[]).map((label,i)=>({label,duration_minutes:[2,5,8,2][i]||5,done:false}));
  const rawAnswer = res.answer || res.reply || '';
  const intent = res.intent || inferLocalIntent(rawAnswer, res.mode||'');
  const answer = rawAnswer || "Let's start with one small step.";
  return {
    ...res,
    intent,
    answer,
    reply:answer,
    micro_task_plan:plan,
    micro_task:plan.map(t=>t.label||String(t)),
    suggested_actions:Array.isArray(res.suggested_actions)&&res.suggested_actions.length?res.suggested_actions:(intent==='teach_concept'?['Explain simpler','Give another example','Quiz me']:plan.slice(0,3).map(t=>t.label||String(t))),
    teaching:res.teaching||{concept:'',explanation:'',example:'',check_question:''},
    check_in_options:res.check_in_options||['Done','Partly done','I got stuck'],
    fallback_used:Boolean(res.fallback_used),
    runtime_source:res.runtime_source || (res.fallback_used ? 'fallback' : 'api_chat'),
    trace:Array.isArray(res.trace)?res.trace:[],
  };
}

function generateLocalChatResult(companion, msg, messages=[]) {
  const scenario = companion.scenario;
  const lower = msg.toLowerCase();
  if (scenario === 'acg') return {
    reply:"I'm here with you. Let's keep this simple — tell me one thing you want to do next, and we'll start from there.",
    detected_state:'Seeking presence', companion_state:'encouraging', mode:'Companion Presence Mode',
    micro_task:['Choose one small next step','Say it out loud','Start for just five minutes'],
    start_button_label:'Start Quiet 5-min Sprint',
    check_in_message:"I'll stay here while you begin. One small step is enough.",
    check_in_options:['Done','Partly done','I got stuck'],
    memory_update:'User prefers warm, voice-based companion interaction.',
  };
  if (scenario === 'study') {
    const intent = detectLocalIntent(msg);
    const teachingSubject = extractConceptSubject(msg);
    const continuationSubject = extractContinuationSubject(msg);
    if(teachingSubject || (intent==='continue_context' && localActiveIntent==='teach_concept')){
      const concept = teachingSubject || continuationSubject || localActiveSubject || 'this concept';
      localActiveSubject = concept;
      localActiveIntent = 'teach_concept';
      return normalizeClientResult(buildLocalTeachingResult(companion, concept));
    }
    if(intent==='vague_help' && localActiveSubject){
      localActiveIntent = 'vague_help';
      return normalizeClientResult(buildLocalVagueHelpResult(companion, localActiveSubject));
    }
    const extractedSubject = extractGoalSubject(msg);
    if(extractedSubject || continuationSubject) localActiveSubject = extractedSubject || continuationSubject;
    const subject = extractedSubject || continuationSubject || localActiveSubject || 'this task';
    const followUp = localActiveSubject && /\b(help me|why not|what should i do|next|continue|guide me|show me)\b/i.test(lower);
    const hasGoal = hasActionableGoal(lower) || extractedSubject || continuationSubject || followUp;
    const low = LOW_KW.some(k=>lower.includes(k));
    if (intent === 'emotional_support') {
      localActiveIntent = 'emotional_support';
      return normalizeClientResult(buildLocalSupportResult(companion, subject));
    }
    if (hasGoal || intent === 'decompose_task' || intent === 'continue_context') {
      localActiveIntent = intent === 'continue_context' ? (localActiveIntent || 'plan_task') : (intent === 'decompose_task' ? 'decompose_task' : 'plan_task');
      return normalizeClientResult(buildLocalStepResult(companion, subject, localActiveIntent));
    }
    if (low) return {
      reply:localToneReply(companion.tone, "I can tell starting feels heavy right now. We do not need to finish everything; we only need one visible first step."),
      detected_state:'Low motivation + difficulty starting', companion_state:'encouraging', mode:'Encourage Mode',
      goal_understanding:"You want to make progress, but the task feels too big right now.",
      micro_task:['Open the material in front of you','Choose one small section','Work for five minutes and stop'],
      start_button_label:'Start 5-min Sprint',

      check_in_options:['Done','Partly done','I got stuck'],
      memory_update:'This user starts better with short, gentle 10-minute sprints when feeling stuck.',
    };
    return {
      reply:"Hey! I'm here with you ☕ What are we working on today? Tell me what's on your plate and we'll find one small step to start with.",
      detected_state:'Ready to begin', companion_state:'idle', mode:'Check-in Mode',
      goal_understanding:'Starting a new session — checking in to understand what you need.',
      micro_task:["Write down today's most important task","Open the right materials","Start for just 5 minutes"],
      start_button_label:'Start Session',
      check_in_message:"Tell me what you're working on and we'll figure it out.",
      check_in_options:['Done','Partly done','I got stuck'],
      memory_update:'User is beginning a new study session.',
    };
  }
  return { // pet + fallback
    reply:"Remember to take a small break. Let's stand up, drink some water, and then continue. 🐾",
    detected_state:'Routine check-in', companion_state:'happy', mode:'Routine Check-in Mode',

function hasLocalSubjectFallback(subject){
  const lower=String(subject||'').toLowerCase();
  return ['algebra','simultaneous equation','quantum','essay','report','internship','application','room','clean','quiz','exam'].some(k=>lower.includes(k));
}

function buildLocalTeaching(concept){

      example:'In x + 3 = 7, x is the unknown number. Since 4 + 3 = 7, x = 4.',
      check_question:'For x + 2 = 6, what is x?',
    };
  }
  return {
    concept,
    explanation:`${concept} is the idea you are trying to understand. Start by asking what it means, what problem it solves, and what a simple example looks like.`,
    example:`Take one small ${concept} example from your notes and label what each symbol or term means before solving it.`,
    check_question:`Can you write one sentence explaining what ${concept} is used for?`,
  };
}

function buildLocalFirstStepTeaching(subject){
  const lower=String(subject||'').toLowerCase();
  if(lower.includes('algebra')){
    return {
      concept:'algebra',
      explanation:'Algebra starts by using a letter as an unknown number, then using the equation to discover what that letter must be.',
      example:'If x + 3 = 7, the question is: what number plus 3 gives 7? The answer is x = 4.',
      check_question:'Try this one: x + 2 = 6. What should x be?',
    };
  }
  if(lower.includes('simultaneous equation')){
    return {
      concept:'simultaneous equations',
      explanation:'A simultaneous-equation problem gives two equations that must be true at the same time. Your job is to find values that satisfy both.',
      example:'If x + y = 5 and x - y = 1, adding them gives 2x = 6, so x = 3. Then y = 2.',
      check_question:'Which method do you want to try first: substitution or elimination?',
    };
  }
  if(lower.includes('quantum')){
    return {
      concept:'quantum mechanics',
      explanation:'A tiny starting point for quantum mechanics is probability: it often predicts the chance of an outcome instead of one fixed classical result.',
      example:'A wavefunction is like a probability description. It helps calculate where a particle may be found when measured.',

  return {
    concept:subject,
    explanation:`For ${subject}, the first useful step is to define what you are trying to do in one sentence, then work through one tiny example or visible action.`,
    example:`Write: "Right now, ${subject} means I need to complete one small visible action." Then name that action.`,
    check_question:`What is the smallest visible part of ${subject} we can do together right now?`,
  };

function inferLocalIntent(reply, mode){
  const lower=String(reply||'').toLowerCase();
  if(/\b(concept|explain|definition|example)\b/.test(lower)) return 'teach_concept';
  if(mode==='Study Companion Mode') return 'vague_help';
  if(mode==='Study Sprint Mode'||mode==='Focus Mode') return 'plan_task';
  if(mode==='Encourage Mode') return 'emotional_support';
  if(mode==='Routine Check-in Mode'||mode==='Routine Mode') return 'routine';
  if(mode==='Check-in Mode') return 'check_in';
  return 'general_chat';
}

function hasActionableGoal(lower){
  return /\b(study|learn|review|prepare|practice|understand|finish|write|work on|start|begin|quiz|exam|homework|assignment|essay|report)\b/i.test(lower);
}

function detectLocalIntent(msg){
  const lower=String(msg||'').toLowerCase();
  if(extractContinuationSubject(msg)) return 'continue_context';
  if(/\b(concept|explain|what is|what are|teach me|define|meaning of|give concept)\b/i.test(lower)) return 'teach_concept';
  if(/\b(concrete step|concrete steps|first step|steps to|step by step|break down|decompose|plan for|how do i start|how to start|show me how to)\b/i.test(lower)) return 'decompose_task';
  if(/\b(quiz me|test me|question me)\b/i.test(lower)) return 'quiz';
  if(/\b(help me|i need help|why not|what should i do|guide me|show me|continue)\b/i.test(lower) && !extractGoalSubject(msg)) return 'vague_help';
  if(LOW_KW.some(k=>lower.includes(k))) return 'emotional_support';
  if(hasActionableGoal(lower)) return 'plan_task';
  return 'general_chat';
}

function extractGoalSubject(msg){
  const text=String(msg||'').trim();
  const patterns=[
    /\b(?:i\s+have|i\s+got|i've\s+got)\s+(?:a|an|the|my)?\s*(.+?)(?:\s+(?:but|and)\s+i\b|$)/i,
    /\b(?:stuck\s+on|stuck\s+with|confused\s+by|confused\s+about|struggling\s+with)\s+(.+)/i,
    /\b(?:i\s+need\s+to|i\s+want\s+to|i\s+have\s+to|i\s+should)\s+(?:study|learn|review|prepare\s+for|practice|understand|finish|start|work\s+on)\s+(.+)/i,
    /\b(?:study|learn|review|prepare\s+for|practice|understand|finish|start|work\s+on)\s+(.+)/i,
    /\b(?:quiz|exam|homework|assignment|essay|report)\s+(?:on|about|for)\s+(.+)/i,
  ];
  for(const p of patterns){
    const m=text.match(p);
    const s=cleanSubject(m&&m[1]);
    if(s) return s;
  }
  return '';
}

function extractContinuationSubject(msg){
  const m=String(msg||'').trim().match(/^(?:and|also|then|next)\s+(.{2,80})$/i);
  return cleanSubject(m&&m[1]);
}

function extractConceptSubject(msg){
  const text=String(msg||'').trim();
  const patterns=[
    /\b(?:concept|definition|meaning)\s+(?:of|for)\s+(.+)/i,
    /\b(?:explain|define|teach\s+me|give\s+me\s+(?:the\s+)?concept\s+of|give\s+concept\s+of)\s+(.+)/i,
    /\bwhat\s+(?:is|are)\s+(.+)/i,
  ];
  for(const p of patterns){
    const m=text.match(p);
    const s=cleanSubject(m&&m[1]);
    if(s) return s;
  }
  return '';
}

function cleanSubject(value){
  if(!value) return '';
  let s=String(value).replace(/\s+/g,' ').replace(/[.!?]+$/g,'').trim();
  s=s.replace(/^(?:learning|studying|reviewing|practicing|starting|start learning|start studying)\s+/i,'')
     .replace(/\b(today|tonight|now|please|pls|again|first)\b.*$/i,'')
     .replace(/\b(?:but|and)\s+(?:i|it|this|that)\b.*$/i,'')
     .replace(/\b(?:for|in)\s+(?:my|the)?\s*(?:quiz|exam|homework|assignment|class)\b.*$/i,'')
     .trim();
  if(!s || /^(it|this|that|something|stuff|task|work)$/i.test(s)) return '';
  return s.slice(0,80);
}

function buildLocalStudyPlan(subject, low){
  const lower=String(subject||'').toLowerCase();
  if(lower.includes('simultaneous equation')){
    return [
      {label:'Open a worked example with two equations and two unknowns',duration_minutes:2,done:false},

      {label:'Solve one line at a time and keep both equations visible',duration_minutes:6,done:false},
      {label:'Substitute the answer back into both equations to check it',duration_minutes:3,done:false},

  if(lower.includes('algebra')){

      {label:'Write one tiny equation and mark the unknown',duration_minutes:3,done:false},
      {label:'Solve one step at a time while keeping the equation balanced',duration_minutes:5,done:false},

function localToneReply(tone, text){
  if(tone==='short_direct') return text.replace(/^I can tell .*?\. /,'').replace(/^We will/,'We’ll');
  if(tone==='cute_playful') return `${text} Tiny progress only.`;
  if(tone==='coach_like') return `${text} Keep it measurable: material, target, one example.`;
  if(tone==='friend_like') return `${text} No need to solve the whole thing in one go.`;
  return `I am here with you. ${text}`;
}

/* =================================================================
   VOICE UTILS (voiceOutput)
   ================================================================= */
const ttsSup = typeof window!=='undefined' && 'speechSynthesis' in window;
let speechRunId=0;
let lockedTtsVoice;
let activeTtsAudio=null;
let activeTtsSource=null;
let ttsAudioContext=null;
function cleanSpeechText(text){
  return String(text)
    .replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu,'')
    .replace(/[—–]/g,', ')
    .replace(/\s+/g,' ')
    .trim();
}
function splitSpeechText(text){
  const cleaned=cleanSpeechText(text);
  if(!cleaned) return [];
  const chunks=[];
  cleaned
    .split(/(?<=[.!?。！？])\s+|(?<=[。！？])|[,，;；]\s*/)
    .map(part=>part.trim())
    .filter(Boolean)
    .forEach(part=>{
      if(part.length<=115){chunks.push(part);return;}
      const words=part.split(/\s+/);
      if(words.length===1){
        for(let i=0;i<part.length;i+=95) chunks.push(part.slice(i,i+95));
        return;
      }
      let line='';
      words.forEach(word=>{
        if((line+' '+word).trim().length>95){
          if(line) chunks.push(line.trim());
          line=word;
        }else{
          line=(line+' '+word).trim();
        }
      });
      if(line) chunks.push(line.trim());
    });
  return chunks;
}
function buildFishTtsChunks(text){
  const speechChunks=splitSpeechText(text);
  const chunks=speechChunks.length?speechChunks:[text];
  const batches=[];
  let current='';
  chunks.forEach(chunk=>{
    const next=current?`${current} ${chunk}`:chunk;
    if(next.length>180&&current){
      batches.push(current);
      current=chunk;
    }else{
      current=next;
    }
  });
  if(current) batches.push(current);
  return batches;
}
function pauseForChunk(chunk,index,total){
  if(index>=total-1) return 0;
  if(/[.!?]$/.test(chunk)) return 420;
  return 260;
}
function chooseNaturalVoice(){
  if(lockedTtsVoice!==undefined) return lockedTtsVoice;
  const voices=window.speechSynthesis.getVoices();
  const english=voices.filter(v=>v.lang&&v.lang.toLowerCase().startsWith('en'));
  const preferred=[
    'Samantha','Karen','Moira','Tessa','Serena',
    'Microsoft Jenny','Microsoft Sonia','Microsoft Ava',
    'Google UK English Female',
  ];
  const femaleVoice=preferred.map(name=>english.find(v=>v.name.includes(name))).find(Boolean);
  if(femaleVoice){
    lockedTtsVoice=femaleVoice;
    return lockedTtsVoice;
  }
  return null;
}
async function unlockTtsAudio(){
  try{
    const AudioCtx=window.AudioContext||window.webkitAudioContext;
    if(!AudioCtx) return null;
    if(!ttsAudioContext) ttsAudioContext=new AudioCtx();
    if(ttsAudioContext.state==='suspended') await ttsAudioContext.resume();
    const buffer=ttsAudioContext.createBuffer(1,1,22050);
    const source=ttsAudioContext.createBufferSource();
    source.buffer=buffer;
    source.connect(ttsAudioContext.destination);
    source.start(0);
    return ttsAudioContext;
  }catch(e){
    return null;
  }
}
if(typeof window!=='undefined'){
  window.addEventListener('pointerdown',unlockTtsAudio,{capture:true});
  window.addEventListener('keydown',unlockTtsAudio,{capture:true});
}
async function speakText(text,onEnd,options={},voiceWaits=0){
  const spoken=cleanSpeechText(text);
  if(!spoken){if(onEnd) onEnd(); return;}
  const runId=++speechRunId;
  const fetchedAudio=[];
  const playAudioUrls=async(bytesList,index=0)=>{
    if(runId!==speechRunId) return;
    if(index>=bytesList.length){if(onEnd) onEnd(); return;}
    const url=URL.createObjectURL(new Blob([bytesList[index]],{type:'audio/mpeg'}));
    const audio=new Audio(url);
    activeTtsAudio=audio;
    audio.onended=()=>{URL.revokeObjectURL(url);activeTtsAudio=null;playAudioUrls(bytesList,index+1);};
    audio.onerror=()=>{
      URL.revokeObjectURL(url);
      activeTtsAudio=null;
      if(options.onError) options.onError();
      else if(onEnd) onEnd();
    };
    await audio.play();
  };
  const makeManualPlay=bytesList=>()=>playAudioUrls(bytesList);
  const playAudioBuffer=async(bytes)=>{
    const AudioCtx=window.AudioContext||window.webkitAudioContext;
    if(!AudioCtx) throw new Error('Web Audio unavailable');
    if(!ttsAudioContext) ttsAudioContext=new AudioCtx();
    if(ttsAudioContext.state==='suspended') await ttsAudioContext.resume();
    if(ttsAudioContext.state!=='running') throw new Error('Audio context blocked');
    const decoded=await ttsAudioContext.decodeAudioData(bytes.slice(0));
    if(runId!==speechRunId) return;
    await new Promise((resolve,reject)=>{
      const source=ttsAudioContext.createBufferSource();
      activeTtsSource=source;
      source.buffer=decoded;
      source.connect(ttsAudioContext.destination);
      source.onended=()=>{
        activeTtsSource=null;
        if(runId!==speechRunId){resolve();return;}
        resolve();
      };
      source.onerror=reject;
      source.start(0);
      if(options.onPlaying) options.onPlaying();
    });
  };
  try{
    if(options.onLoading) options.onLoading();
    window.speechSynthesis?.cancel();
    if(activeTtsAudio){
      activeTtsAudio.pause();
      activeTtsAudio.src='';
      activeTtsAudio=null;
    }
    if(activeTtsSource){
      try{activeTtsSource.stop(0);}catch(e){}
      activeTtsSource=null;
    }

    const fishChunks=buildFishTtsChunks(spoken);
    for(const chunk of fishChunks){
      if(runId!==speechRunId) return;
      const response=await fetch('/api/tts',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({text:chunk}),
      });
      if(!response.ok) throw new Error('TTS proxy failed');
      fetchedAudio.push(await response.arrayBuffer());
    }
    if(runId!==speechRunId) return;
    if(options.onReady) options.onReady(makeManualPlay(fetchedAudio));
    for(const bytes of fetchedAudio){
      if(runId!==speechRunId) return;
      await playAudioBuffer(bytes);
    }
    if(onEnd) onEnd();
  }catch(e){
    if(fetchedAudio.length&&options.onBlocked){
      options.onBlocked(makeManualPlay(fetchedAudio));
      return;
    }
    console.warn('[nextstep_tts_error]', 'Fish Audio /api/tts failed or was blocked. Falling back to browser speechSynthesis.');
    speakBrowserText(spoken,onEnd);
  }
}
function speakBrowserText(text,onEnd,voiceWaits=0,runId=++speechRunId){
  try{
    if(!ttsSup){if(onEnd) onEnd();return;}
    window.speechSynthesis.cancel();
    const chunks=splitSpeechText(text);
    if(chunks.length===0){if(onEnd) onEnd(); return;}
    const pref=chooseNaturalVoice();
    if(!pref&&voiceWaits<12){
      setTimeout(()=>speakBrowserText(text,onEnd,voiceWaits+1,runId),150);
      return;
    }
    const speakChunk=(index)=>{
      if(runId!==speechRunId) return;
      if(index>=chunks.length){if(onEnd) onEnd(); return;}
      const u=new SpeechSynthesisUtterance(chunks[index]);
      u.rate=0.8; u.pitch=pref?0.9:1.04; u.volume=0.9;
      if(pref) u.voice=pref;
      const next=()=>setTimeout(()=>speakChunk(index+1),pauseForChunk(chunks[index],index,chunks.length));
      u.onend=next;
      u.onerror=next;
      window.speechSynthesis.speak(u);
    };
    speakChunk(0);
  }catch(e){}
}
function stopSpeaking(){try{speechRunId++;if(activeTtsSource){try{activeTtsSource.stop(0);}catch(e){}activeTtsSource=null;}if(activeTtsAudio){activeTtsAudio.pause();activeTtsAudio.src='';activeTtsAudio=null;}if(ttsSup) window.speechSynthesis.cancel();}catch(e){}}

/* =================================================================
   VOICE INPUT HOOK (useVoiceInput) — push-to-talk via /api/stt
   ================================================================= */
function useVoiceInput(onReady){
  const [listening,setListening]=useState(false);
  const [interim,setInterim]=useState('');
  const [err,setErr]=useState(null);
  const recorderRef=useRef(null);
  const chunksRef=useRef([]);
  const streamRef=useRef(null);
  const sup=typeof navigator!=='undefined'&&!!navigator.mediaDevices?.getUserMedia&&typeof MediaRecorder!=='undefined';

  useEffect(()=>()=>{
    if(recorderRef.current&&recorderRef.current.state!=='inactive') recorderRef.current.stop();
    streamRef.current?.getTracks().forEach(t=>t.stop());
  },[]);

  const start=useCallback(()=>{
    if(listening||!sup) return;
    setErr(null);
    chunksRef.current=[];
    navigator.mediaDevices.getUserMedia({audio:true})
      .then(stream=>{
        streamRef.current=stream;
        const mimeType=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm';
        const recorder=new MediaRecorder(stream,{mimeType});
        recorderRef.current=recorder;
        recorder.ondataavailable=e=>{if(e.data.size>0) chunksRef.current.push(e.data);};
        recorder.onstop=()=>{
          streamRef.current?.getTracks().forEach(t=>t.stop());
          const blob=new Blob(chunksRef.current,{type:mimeType});
          if(!blob.size) return;
          const reader=new FileReader();
          reader.onload=()=>{
            const base64=reader.result.split(',')[1];
            fetch('/api/stt',{method:'POST',headers:{'Content-Type':'application/json'},
              body:JSON.stringify({audio:base64,mimeType})})
              .then(r=>r.json())
              .then(d=>{
                setInterim('');
                if(d.text&&onReady) onReady(d.text);
                else if(d.error){
                  const details=[
                    d?.provider?`provider=${d.provider}`:null,
                    d?.model?`model=${d.model}`:null,
                    typeof d?.provider_status==='number'?`provider_status=${d.provider_status}`:null
                  ].filter(Boolean).join(' ');
                  const providerBody=typeof d?.provider_body==='string'&&d.provider_body.trim()?` ${d.provider_body.trim()}`:'';
                  const suffix=details?` (${details})${providerBody}`:providerBody;
                  setErr(`${d.error}${suffix}`);
                }
              })
              .catch(()=>setErr('Voice input failed. Please type your message.'));
          };
          reader.readAsDataURL(blob);
        };
        recorder.start();
        setListening(true);
        setInterim('Recording…');
      })
      .catch(e=>{
        setErr(e.name==='NotAllowedError'?'Microphone access denied. Please allow and try again.':
          'Voice input failed. Please type your message.');
      });
  },[listening,sup,onReady]);

  const stop=useCallback(()=>{
    if(recorderRef.current&&recorderRef.current.state!=='inactive'){
      recorderRef.current.stop();
      setListening(false);
      setInterim('Transcribing…');
    }
  },[]);

  return{listening,interim,start,stop,err,sup};
}

/* =================================================================
   LIVE2D STAGE
   Loads the Live2D Cubism model when pixi-live2d-display is available.
   Falls back to AnimatedACGFallback if loading fails.
   ================================================================= */
function Live2DStage({speaking, onReady, className}){
  const canvasRef=useRef(null);
  const live2dRef=useRef(null);  // {app, model}
  const [failed,setFailed]=useState(false);
  const [loaded,setLoaded]=useState(false);

  useEffect(()=>{
    let cancelled=false;
    async function init(){
      try{
        if(typeof PIXI==='undefined'||!PIXI.live2d) throw new Error('PIXI.live2d not available');
        const canvas=canvasRef.current;
        if(!canvas) return;
        const W=canvas.parentElement.clientWidth||400;
        const H=canvas.parentElement.clientHeight||600;
        const app=new PIXI.Application({view:canvas,transparent:true,autoStart:true,width:W,height:H,resolution:window.devicePixelRatio||1,autoDensity:true});
        const model=await PIXI.live2d.Live2DModel.from(ACG_MODEL_PATH);
        if(cancelled){app.destroy(true);return;}
        // Scale to fit
        const scaleX=W/model.width, scaleY=H/model.height;
        const scale=Math.min(scaleX,scaleY)*0.82;
        model.scale.set(scale);
        model.anchor.set(0.5,0.5);
        model.x=W/2; model.y=H*0.52;
        app.stage.addChild(model);
        live2dRef.current={app,model};
        setLoaded(true);
        if(onReady) onReady();
      }catch(e){
        console.warn('[Live2D] Load failed, using fallback:',e.message);
        if(!cancelled) setFailed(true);
      }
    }
    init();
    return()=>{
      cancelled=true;
      if(live2dRef.current){live2dRef.current.app.destroy(true);live2dRef.current=null;}
    };
  },[]);

  // Mouth animation while speaking
  useEffect(()=>{
    if(!live2dRef.current) return;
    const {model}=live2dRef.current;
    let raf;
    if(speaking){
      let t=0;
      const tick=()=>{
        t+=0.18;
        const v=Math.max(0,(Math.sin(t)*0.5+0.5));
        try{model.internalModel.coreModel.setParameterValueById('ParamMouthOpenY',v);}catch(e){}
        raf=requestAnimationFrame(tick);
      };
      raf=requestAnimationFrame(tick);
    } else {
      try{model.internalModel.coreModel.setParameterValueById('ParamMouthOpenY',0);}catch(e){}
    }
    return()=>raf&&cancelAnimationFrame(raf);
  },[speaking]);

  if(failed) return <AnimatedACGFallback speaking={speaking}/>;

  return(
    <div className={`relative ${className||''}`}>
      <canvas ref={canvasRef} id="live2d-canvas" style={{display:loaded?'block':'none'}}/>
      {!loaded&&<AnimatedACGFallback speaking={speaking}/>}
    </div>
  );
}

/* =================================================================

    transformStyle:'preserve-3d',
    transition: hov ? 'transform 0.08s ease-out':'transform 0.45s ease-out',
    transform: hov
      ? `perspective(700px) rotateX(${my}deg) rotateY(${mx}deg) scale(1.04)`

          {/* Blurred background layer */}
          {hasImage&&<img src={imageUrl} alt="bg" onError={()=>setImageFailed(true)} className="absolute inset-0 w-full h-full object-cover opacity-30" style={{filter:'blur(8px) brightness(0.6)',transform:'scale(1.08)'}}/>}
          {/* Shimmer */}
          <div className="absolute inset-0 pointer-events-none" style={{background:'linear-gradient(135deg,rgba(255,255,255,0.25) 0%,transparent 50%,rgba(255,255,255,0.05) 100%)',opacity:0.4}}/>

/* Micro-task Panel */
function MicroTaskPanel({result,onCheckIn}){
  const tasks=getMicroTaskPlan(result);
  const [checked,setChecked]=useState({});
  const [sprint,setSprint]=useState(false);
  const [showCheckIn,setShowCheckIn]=useState(false);
  const [activeTask,setActiveTask]=useState(0);
  const [seconds,setSeconds]=useState(getMicroTaskItems(result)[0]?.duration_minutes*60||60);
  const [checkIn,setCheckIn]=useState(null);

  const taskItems=getMicroTaskItems(result);
  const currentTask=taskItems[activeTask]||taskItems[0]||{label:'Start',duration_minutes:1};

  const [checkInSync,setCheckInSync]=useState('');


  const done=Object.values(checked).filter(Boolean).length;
  const selectTask=i=>{
    if(sprint) return;
    const task=taskItems[i];
    if(!task) return;
    setActiveTask(i);
    setSeconds(task.duration_minutes*60);
    setShowCheckIn(false);
  };
  const startTask=i=>{
    const task=taskItems[i]||taskItems[0];
    if(!task) return;
    setActiveTask(i);
    setSeconds(task.duration_minutes*60);
    setSprint(true);
    setShowCheckIn(false);
  };
  const completeCurrentTask=()=>{
    const nextChecked={...checked,[activeTask]:true};
    setChecked(nextChecked);
    setSprint(false);
    const nextIndex=taskItems.findIndex((_,i)=>!nextChecked[i]);
    if(nextIndex>-1){
      setActiveTask(nextIndex);
      setSeconds(taskItems[nextIndex].duration_minutes*60);
    }else{
      setShowCheckIn(true);
    }
  };
  useEffect(()=>{
    setChecked({});
    setSprint(false);
    setShowCheckIn(false);
    setActiveTask(0);
    setSeconds(getMicroTaskItems(result)[0]?.duration_minutes*60||60);
    setCheckIn(null);
    setCheckInSync('');
  },[result.reply]);
  useEffect(()=>{
    if(!sprint||seconds<=0) return;
    const id=setInterval(()=>setSeconds(s=>Math.max(0,s-1)),1000);
    return()=>clearInterval(id);
  },[sprint,seconds]);
  const mm=String(Math.floor(seconds/60)).padStart(2,'0');
  const ss=String(seconds%60).padStart(2,'0');
  const pct=Math.max(0,Math.min(100,(seconds/(currentTask.duration_minutes*60))*100));
  return(
    <div className="rounded-2xl glass p-4 space-y-4">
      <p className="text-xs font-bold text-white/40 uppercase tracking-widest flex items-center gap-1.5">
        <span>🎯</span>Tiny Steps For This Sprint

        {done>0&&<span className="ml-auto bg-green-500/20 text-green-300 border border-green-500/30 text-xs font-bold px-2 py-0.5 rounded-full">{done}/{taskItems.length}</span>}

      </p>
      {result.goal_understanding&&(
        <div className="rounded-xl border border-amber-400/20 bg-amber-500/10 p-3">
          <p className="text-xs font-black text-amber-200/70 uppercase tracking-widest mb-1">Companion understood</p>
          <p className="text-sm text-amber-100/80 font-medium leading-relaxed">{result.goal_understanding}</p>
        </div>
      )}

      {taskItems.map((task,i)=>(
        <button key={i} onClick={()=>selectTask(i)}
          className={`w-full flex items-center gap-3 text-left p-2.5 rounded-xl transition-all ${activeTask===i?'bg-indigo-500/15 border border-indigo-400/30':checked[i]?'bg-green-500/15 border border-green-500/30':'bg-white/5 hover:bg-white/10'}`}>
          <span className={`w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 ${checked[i]?'bg-green-400 border-green-400':activeTask===i?'border-indigo-300 bg-indigo-300/20':'border-white/30'}`}>
            {checked[i]&&<span className="text-white text-xs font-black">✓</span>}
          </span>
          <span className={`flex-1 text-sm font-medium ${checked[i]?'text-green-400 line-through':'text-white/70'}`}>{task.label}</span>
          <span className={`text-xs font-black ${activeTask===i?'text-indigo-200':'text-white/35'}`}>{task.duration_minutes} min</span>

        </button>
      ))}
      {!sprint?(
        <button onClick={()=>startTask(activeTask)}
          className="w-full py-3 rounded-xl bg-gradient-to-r from-amber-400 to-orange-500 text-white font-black text-sm shadow-lg hover:shadow-amber-500/20 transition-all">
          ▶ Start selected task · {currentTask.duration_minutes} min
        </button>
      ):(
        <div className="rounded-xl border border-indigo-400/20 bg-indigo-500/10 p-4 text-center">
          <div className="mb-3 rounded-full border border-indigo-300/20 bg-indigo-300/10 px-3 py-1 text-xs font-black text-indigo-100">
            🔄 {result.mode} → Study Sprint Mode
          </div>
          <p className="text-xs font-black text-indigo-200/70 uppercase tracking-widest mb-2">Task {activeTask+1} of {taskItems.length} · {currentTask.duration_minutes}-min timer</p>
          <p className="mb-2 text-sm font-bold text-indigo-50/90 leading-relaxed">{currentTask.label}</p>
          <p className="text-4xl font-black text-indigo-100 font-mono">{mm}:{ss}</p>
          <p className="mt-2 text-xs text-indigo-100/60 font-medium">Your companion is staying with you while you start.</p>
          <div className="h-2 rounded-full bg-white/10 overflow-hidden mt-3">
            <div className="h-full bg-indigo-300 transition-all" style={{width:`${pct}%`}}/>
          </div>
          <div className="mt-3 flex gap-2">
            <button onClick={()=>setSprint(false)} className="flex-1 rounded-lg border border-indigo-300/20 px-2 py-2 text-xs font-bold text-indigo-200/80 hover:text-indigo-100">
              Pause
            </button>
            <button onClick={completeCurrentTask} className="flex-1 rounded-lg bg-indigo-300/20 px-2 py-2 text-xs font-bold text-indigo-100 hover:bg-indigo-300/30">
              Finish task
            </button>
          </div>
          {seconds===0&&(
            <button onClick={completeCurrentTask} className="mt-3 w-full rounded-lg bg-green-400/20 px-2 py-2 text-sm font-black text-green-200 hover:bg-green-400/30">
              Time is up · Mark task done
            </button>
          )}
        </div>
      )}
      {result.check_in_message&&showCheckIn&&(
        <div className="bg-blue-500/10 border border-blue-400/20 rounded-xl p-3">
          <p className="text-xs font-bold text-blue-300/70 uppercase tracking-widest mb-1">💌 Check-in</p>
          <p className="text-sm text-blue-200/80 font-medium leading-relaxed mb-3">{result.check_in_message}</p>
          {checkIn?(
            <p className="text-xs text-blue-200/80 font-bold">Noted: {checkIn}</p>
          ):(
            <div className="grid grid-cols-3 gap-2">
              {(result.check_in_options||['Done','Partly done','I got stuck']).map(opt=>(
                <button key={opt} onClick={async()=>{setCheckIn(opt);setCheckInSync('Syncing with session memory...');try{if(onCheckIn) await onCheckIn(opt);setCheckInSync('Saved to session memory.');}catch(err){setCheckInSync('Could not sync to the server. Your text chat still works.');}}}
                  className="rounded-lg border border-blue-300/20 bg-white/5 px-2 py-2 text-xs font-bold text-blue-100 hover:bg-blue-400/10">
                  {opt}
                </button>
              ))}
            </div>
          )}
          {checkInSync&&<p className="mt-2 text-xs font-semibold text-blue-100/70">{checkInSync}</p>}
        </div>
      )}
      {result.memory_update&&(
        <div className="bg-violet-500/10 border border-violet-400/20 rounded-xl p-3">
          <p className="text-xs font-bold text-violet-300/70 uppercase tracking-widest mb-1">🧠 Memory Updated</p>
          <p className="text-sm text-violet-200/80 font-medium leading-relaxed italic">"{result.memory_update}"</p>
        </div>
      )}
      {Array.isArray(result.trace)&&result.trace.length>0&&(
        <div className="bg-white/5 border border-white/10 rounded-xl p-3">
          <p className="text-xs font-bold text-white/30 uppercase tracking-widest mb-2">Runtime Trace</p>
          {result.trace.slice(0,3).map((item,i)=>(
            <p key={i} className="text-xs text-white/45 leading-relaxed">{item.step}: {item.status} - {item.summary}</p>
          ))}
        </div>
      )}
    </div>
  );
}

function ImageUpload({scenario,onGenerate,onBack}){
  const [img,setImg]=useState(null);       // base64 preview
  const [rawFile,setRawFile]=useState(null); // actual File object → createObjectURL
  const defaultId=scenario==='study'?'coffee':null;
  const [defId,setDefId]=useState(defaultId);
  const [drag,setDrag]=useState(false);
  const [uploadError,setUploadError]=useState('');
  const fileRef=useRef(null);
  const meta=SCENARIO_META.find(s=>s.id===scenario);
  const c=COMPANIONS[scenario];

  const readFile=f=>{
    if(!f||!f.type.startsWith('image/')){
      setImg(null);setRawFile(null);setDefId(defaultId);
      setUploadError('Please choose a JPG, PNG, or WEBP image. Using the default companion instead.');
      return;
    }
    const r=new FileReader();
    r.onload=e=>{
      if(!e.target?.result){setImg(null);setRawFile(null);setDefId(defaultId);setUploadError('We could not read that image. Using the default companion instead.');return;}
      setImg(e.target.result);setRawFile(f);setDefId(null);setUploadError('');
    };
    r.onerror=()=>{setImg(null);setRawFile(null);setDefId(defaultId);setUploadError('We could not read that image. Using the default companion instead.');};
    r.readAsDataURL(f);
  };
  const onDrop=e=>{e.preventDefault();setDrag(false);readFile(e.dataTransfer.files[0]);};

  const go=()=>{
    // Pass the object URL (stable) for use throughout the app, or null for default
    const imageUrl = rawFile ? URL.createObjectURL(rawFile) : null;
    const defaultMeta = defId ? meta.defaults.find(d=>d.id===defId) : null;
    onGenerate(imageUrl, img, defaultMeta);  // imageUrl = objectURL (for display), img = base64 (for preview)
  };

  const sel=img!==null||defId!==null;

  return(
    <div className="min-h-screen flex flex-col items-center justify-center px-4 py-10">
      <div className="w-full max-w-xl anim-slide-up">
        <button onClick={onBack} className="flex items-center gap-1 text-sm text-white/40 hover:text-white/70 mb-6 transition-colors">← Back</button>

        <div className="glass-bright rounded-3xl p-6 mb-6 border border-white/10">
          <div className="flex items-center gap-3 mb-2">
            <span className="text-3xl">{meta.icon}</span>
            <div>
              <p className="text-xs font-bold text-white/30 uppercase tracking-widest">Selected Scenario</p>
              <h2 className="text-xl font-bold text-white">{meta.title}</h2>
            </div>
          </div>
          <p className="text-sm text-white/50">{meta.desc}</p>
        </div>

        {/* Upload area */}
        <div onClick={()=>fileRef.current.click()}
          onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={onDrop}
          className={`border-2 border-dashed rounded-3xl p-8 text-center cursor-pointer glass transition-all duration-200 mb-5
            ${drag?'border-violet-400 ring-2 ring-violet-400/40':'border-white/20 hover:border-white/30'}`}>
          <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={e=>readFile(e.target.files[0])}/>
          {img?(
            <div className="flex flex-col items-center gap-3">
              <img src={img} alt="preview" className="w-36 h-36 object-cover rounded-2xl shadow-lg border border-white/20"/>
              <p className="text-sm font-medium text-white/70">Image selected ✓</p>
              <p className="text-xs text-white/40">Click to change</p>
            </div>
          ):(
            <div className="py-4">
              <div className="text-4xl mb-3">📁</div>
              <p className="text-sm font-semibold text-white/70 mb-1">Upload your image</p>
              <p className="text-xs text-white/40">Drag & drop or click to browse · JPG PNG WEBP</p>
            </div>
          )}
        </div>
        {uploadError&&<p className="mb-4 rounded-xl border border-amber-400/30 bg-amber-500/10 px-3 py-2 text-xs font-semibold text-amber-100">{uploadError}</p>}

        <p className="text-xs font-bold text-white/30 uppercase tracking-widest mb-3">Or choose a default</p>
        <div className="grid grid-cols-3 gap-3 mb-6">
          {meta.defaults.map(d=>(
            <button key={d.id} onClick={()=>{setDefId(d.id);setImg(null);setRawFile(null);setUploadError('');}}
              className={`flex flex-col items-center gap-2 p-4 rounded-2xl border transition-all glass
                ${defId===d.id?'ring-2 ring-violet-400/60 border-violet-400/40':'border-white/10 hover:border-white/20'}`}>
              {d.assetUrl ? (
                <img src={d.assetUrl} alt={d.label} className="w-14 h-14 rounded-xl object-cover border border-white/10 shadow-lg"/>
              ) : (
                <span className="text-3xl">{d.emoji}</span>
              )}
              <span className="text-xs font-medium text-white/60">{d.label}</span>
              {defId===d.id&&<span className="text-xs font-bold text-violet-400">✓ Selected</span>}
            </button>
          ))}
        </div>

        <button onClick={go} disabled={!sel}
          className={`w-full py-4 rounded-2xl text-white font-bold text-base shadow-lg transition-all
            ${sel?`bg-gradient-to-r ${c.btnCls} hover:shadow-xl hover:-translate-y-0.5`:'bg-white/10 text-white/40 cursor-not-allowed'}`}>
          Generate Companion →
        </button>
        {!sel&&<p className="text-center text-xs text-white/30 mt-3">Upload or choose a default to continue</p>}
      </div>
    </div>
  );
}

/* =================================================================
   PAGE 3 — Generation Progress
   ================================================================= */
function GenerationProgress({scenario,sourceImg,onDone}){
  const meta=SCENARIO_META.find(s=>s.id===scenario);
  const steps=meta.steps;
  const [current,setCurrent]=useState(0);

  useEffect(()=>{
    if(current>=steps.length){setTimeout(onDone,400);return;}
    const delay=current===steps.length-1?1000:700+Math.random()*400;
    const t=setTimeout(()=>setCurrent(p=>p+1),delay);
    return()=>clearTimeout(t);
  },[current]);

  const pct=Math.round((current/steps.length)*100);

  return(
    <div className="min-h-screen flex flex-col items-center justify-center px-4 py-12">
      <div className="w-full max-w-lg anim-slide-up text-center">
        {/* Source image preview — persists here */}
        {sourceImg&&(
          <div className="flex justify-center mb-8">
            <div className="relative">
              <img src={sourceImg} alt="source" className="w-28 h-28 object-cover rounded-2xl shadow-2xl border border-violet-400/30" style={{filter:'drop-shadow(0 0 20px rgba(124,58,237,0.5))'}}/>
              <div className="absolute inset-0 rounded-2xl" style={{background:'linear-gradient(135deg,transparent,rgba(124,58,237,0.3))',border:'1px solid rgba(167,139,250,0.4)'}}/>
              <div className="absolute -bottom-2 -right-2 bg-violet-500/30 border border-violet-400/40 rounded-lg px-2 py-0.5 text-xs text-violet-300 font-semibold backdrop-blur">
                Your image
              </div>
            </div>
          </div>
        )}

        <h2 className="text-2xl font-black text-white mb-2">Generating {COMPANIONS[scenario].name}…</h2>
        <p className="text-sm text-white/40 mb-8">Transforming your image into a companion</p>

        {/* Steps */}
        <div className="space-y-3 text-left mb-8">
          {steps.map((s,i)=>(
            <div key={i} className="flex items-center gap-3">
              <span className={`w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0 text-xs font-black
                ${i<current?'bg-violet-500 text-white':i===current?'bg-violet-500/30 border-2 border-violet-400 text-violet-300 anim-bounce-soft':'bg-white/5 border border-white/10 text-white/20'}`}>
                {i<current?'✓':i+1}
              </span>
              <span className={i<current?'step-done':i===current?'step-active':'step-pending'}>{s}</span>
              {i===current&&i<steps.length&&(
                <span className="ml-auto w-4 h-4 border-2 border-violet-400 border-t-transparent rounded-full anim-spin flex-shrink-0"/>
              )}
            </div>
          ))}
        </div>

        {/* Progress bar */}
        <div className="w-full h-2 bg-white/10 rounded-full overflow-hidden">
          <div className="h-full rounded-full bg-gradient-to-r from-violet-500 to-indigo-500 transition-all duration-700"
            style={{width:`${pct}%`}}/>
        </div>
        <p className="text-xs text-white/30 mt-3">{pct}% complete</p>
      </div>
    </div>
  );
}
