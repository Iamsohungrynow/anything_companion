function ChatInterface({companion,messages,onAdd,onResult,lastResult,onViewMemory,onVideoMode}){
  const [input,setInput]=useState('');
  const [typing,setTyping]=useState(false);
  const [speakingId,setSpeakingId]=useState(null);
  const [pendingChatVoice,setPendingChatVoice]=useState(null);
  const [voiceErrorId,setVoiceErrorId]=useState(null);
  const messagesRef=useRef(null);
  const endRef=useRef(null);
  const shouldFollowMessagesRef=useRef(true);
  const c=COMPANIONS[companion.scenario];
  const currentState=getCompanionStateInfo(typing?'thinking':lastResult?.companion_state);
  const runtimeFallback=Boolean(lastResult?.fallback_used);

  const onVoice=useCallback(t=>{if(t.trim()) send(t.trim());},[]);
  const voice=useVoiceInput(onVoice);

  const handleMessageScroll=e=>{
    const el=e.currentTarget;
    shouldFollowMessagesRef.current=el.scrollHeight-el.scrollTop-el.clientHeight<48;
  };

  useEffect(()=>{
    if(!shouldFollowMessagesRef.current) return;
    const el=messagesRef.current;
    if(el) el.scrollTo({top:el.scrollHeight,behavior:'smooth'});
  },[messages,typing]);

  useEffect(()=>{
    if(messages.length===0){
      const texts={
        acg:`Hi, I'm ${companion.name} ✨ I'm here with you. What would you like to talk about?`,
        study:`Hey! I'm ${companion.name} ☕ What are we working on today?`,
        pet:`Hey! ${companion.name} here 🐾 How are you feeling right now?`,
      };
      onAdd({id:'c-welcome',role:'companion',content:texts[companion.scenario],ts:Date.now()});
    }
  },[]);

  const send=async text=>{
    if(!text.trim()) return;
    const userMessage=text.trim();
    onAdd({id:`u-${Date.now()}`,role:'user',content:userMessage,ts:Date.now()});
    setInput('');setTyping(true);
    await new Promise(r=>setTimeout(r,900));
    const res=await generateChatResult(companion,userMessage,'text',messages);
    setTyping(false);
    const assistantText=getAssistantText(res);
    console.info('[nextstep_render]', {build_marker:BUILD_MARKER, surface:'chat', final_assistantText:assistantText, answer:res.answer, reply:res.reply});
    const cMsg={id:`c-${Date.now()}`,role:'companion',content:assistantText,mode:res.mode,ts:Date.now()};
    onAdd(cMsg);
    onResult(res,userMessage);
  };

  const handleCheckIn=async option=>{
    const recentGoal=[...messages].reverse().find(message=>message.role==='user')?.content||`Sprint check-in: ${option}`;
    if(FORCE_LOCAL_RUNTIME){
      const res=buildMarkedLocalFallback(companion,recentGoal,messages,'Browser-only backup recorded the check-in locally.');
      const localMemory={
        ...(res.memory||{}),
        check_in_history:[{date:new Date().toISOString(),goal:recentGoal,result:option.toLowerCase().replace(/\s+/g,'_')}],
        latest_memory_update:res.memory_update,
      };
      onResult({...res,memory:localMemory},recentGoal);
      return res;
    }
    try{
      const res=await requestRuntimeTurn({
        session_id:runtimeSessionId,
        scenario:companion.scenario,
        message:recentGoal,
        channel:'text',
        tone:companion.tone,
        role:companion.role,
        use_case:companion.use_case,
        companion,
        check_in_result:option,
      });
      onResult(res,recentGoal);
      return res;
    }catch(err){
      console.warn('Check-in sync unavailable:',err);
      throw err;
    }
  };

  const doSpeak=(id,text)=>{
    if(speakingId===id){
      stopSpeaking();
      setSpeakingId(null);
      setPendingChatVoice(null);
      return;
    }
    setPendingChatVoice(null);
    setVoiceErrorId(null);
    speakText(text,()=>setSpeakingId(null),{
      onBlocked:(playVoice)=>{
        setSpeakingId(null);
        setPendingChatVoice({id,playVoice});
      },
      onError:()=>{
        setSpeakingId(null);
        setVoiceErrorId(id);
      }
    });
    setSpeakingId(id);
  };

  return(
    <div className="min-h-screen flex flex-col lg:flex-row">
      {/* Chat column */}
      <div className="flex-1 flex flex-col max-w-2xl mx-auto w-full px-4 py-6">
        {/* Header — shows companion visual */}
        <div className="flex items-center gap-4 mb-5 glass rounded-2xl p-4 border border-white/10">
          {/* COMPANION VISUAL (uses uploaded image / ACG portrait, NOT generic pink card) */}
          <div className="flex-shrink-0 w-14 h-14 relative rounded-xl overflow-hidden"
            style={{boxShadow:`0 0 16px ${c.bgAccent}`}}>
            {companion.scenario==='acg' ? (
              <img src={ACG_IMG_CARD} alt={companion.name} className="w-full h-full object-cover" style={{filter:`drop-shadow(0 0 8px rgba(124,58,237,0.6))`}}/>
            ) : companion.sourceImageUrl ? (
              <img src={companion.sourceImageUrl} alt={companion.name} className="w-full h-full object-cover"/>
            ) : (
              <div className="w-full h-full flex items-center justify-center text-2xl" style={{background:c.gradient}}>{companion.emoji}</div>
            )}
            <div className="absolute -right-1 -bottom-1 w-6 h-6 rounded-full bg-black/70 border border-white/20 flex items-center justify-center text-xs">
              {currentState.emoji}
            </div>
          </div>
          <div className="flex-1 min-w-0">
            <h2 className="text-lg font-black text-white truncate">{companion.name}</h2>
            <p className="text-xs text-white/40 truncate">{companion.type}</p>
            <div className="flex items-center gap-1.5 mt-1">
              <span className={`w-2 h-2 rounded-full anim-bounce-soft ${runtimeFallback?'bg-amber-300':'bg-green-400'}`}/>
              <span className={`text-xs font-semibold ${runtimeFallback?'text-amber-300':'text-green-400'}`}>{runtimeFallback?'Runtime fallback':'Online'}</span>
              {lastResult&&<><span className="text-white/20 mx-1">·</span><span className="text-xs text-white/40">{lastResult.mode}</span><span className="text-xs text-white/25">· {currentState.label}</span></>}
            </div>
          </div>
          <div className="flex gap-2 flex-shrink-0">
            <button onClick={onVideoMode} className={`text-xs font-bold text-white px-3 py-2 rounded-xl bg-gradient-to-r ${c.btnCls} shadow-sm`}>
              🎬 Video Mode
            </button>
            <button onClick={onViewMemory} className="text-xs font-bold text-white/40 hover:text-white/70 border border-white/10 rounded-xl px-3 py-2 transition-colors hover:bg-white/5">
              Memory →
            </button>
          </div>
        </div>
        {runtimeFallback&&(
          <div className="mb-4 rounded-xl border border-amber-400/30 bg-amber-500/10 px-3 py-2 text-xs font-semibold text-amber-100">
            {getRuntimeFallbackMessage(lastResult)}
          </div>
        )}

        {/* Messages */}
        <div ref={messagesRef} onScroll={handleMessageScroll} className="flex-1 overflow-y-auto space-y-4 mb-4 min-h-72 max-h-96 pr-1">
          {messages.map((msg,idx)=>(
            <React.Fragment key={msg.id}>
            {msg.role==='companion'&&msg.mode&&messages[idx-1]?.role==='user'&&(
              <div className={`mx-auto w-fit rounded-full border px-3 py-1 text-xs font-black ${c.modeCls} msg-in`}>
                🔄 Mode switched to {msg.mode}
              </div>
            )}
            <div className={`flex ${msg.role==='user'?'justify-end':'justify-start'} msg-in`}>
              {msg.role==='companion'&&(
                <div className="w-7 h-7 min-w-7 min-h-7 max-w-7 max-h-7 rounded-full flex items-center justify-center flex-none mr-2 mt-1 text-sm overflow-hidden"
                  style={{background:c.gradient}}>
                  {companion.scenario==='acg'
                    ? <img src={ACG_IMG_CARD} alt="" className="w-full h-full object-cover"/>
                    : companion.sourceImageUrl
                      ? <img src={companion.sourceImageUrl} alt="" className="w-full h-full object-cover"/>
                      : companion.emoji}
                </div>
              )}
              <div className={`max-w-[78%] flex flex-col gap-1 ${msg.role==='user'?'items-end':'items-start'}`}>
                <div className={`px-4 py-3 rounded-2xl text-sm leading-relaxed
                  ${msg.role==='user'?'bg-white/10 text-white rounded-tr-sm border border-white/10':`glass border ${c.cardCls} text-white/85 rounded-tl-sm`}`}>
                  {msg.content}
                </div>
                {msg.role==='companion'&&ttsSup&&(
                  <div className="flex flex-wrap items-center gap-1">
                    <button onClick={()=>doSpeak(msg.id,msg.content)}
                      className={`text-xs flex items-center gap-1 px-2 py-0.5 rounded-full transition-colors ${speakingId===msg.id?'bg-violet-500/30 text-violet-300 font-bold':'text-white/30 hover:text-white/60 hover:bg-white/5'}`}>
                      {speakingId===msg.id?'⏹ Stop':pendingChatVoice?.id===msg.id?'🔊 Fish ready':'🔊 Play'}
                    </button>
                    {pendingChatVoice?.id===msg.id&&(
                      <button
                        onClick={()=>{const play=pendingChatVoice.playVoice;setPendingChatVoice(null);setSpeakingId(msg.id);play().finally(()=>setSpeakingId(null));}}
                        className="text-xs flex items-center gap-1 px-2 py-0.5 rounded-full bg-violet-500/25 text-violet-200 font-bold hover:bg-violet-500/35 transition-colors">
                        Tap to play Fish
                      </button>
                    )}
                    {voiceErrorId===msg.id&&(
                      <span className="text-xs text-red-300/80">Fish voice unavailable</span>
                    )}
                  </div>
                )}
              </div>
            </div>
            </React.Fragment>
          ))}
          {typing&&(
            <div className="flex justify-start msg-in">
              <div className="w-7 h-7 min-w-7 min-h-7 max-w-7 max-h-7 rounded-full flex items-center justify-center flex-none mr-2 mt-1 text-sm overflow-hidden" style={{background:c.gradient}}>
                {companion.scenario==='acg'
                  ? <img src={ACG_IMG_CARD} alt="" className="w-full h-full object-cover"/>
                  : companion.sourceImageUrl
                    ? <img src={companion.sourceImageUrl} alt="" className="w-full h-full object-cover"/>
                    : companion.emoji}
              </div>
              <div className={`px-4 py-3 rounded-2xl glass border ${c.cardCls}`}>
                <div className="flex gap-1 items-center h-4">{[0,1,2].map(i=><div key={i} className="w-2 h-2 rounded-full bg-white/40 typing-dot" style={{animationDelay:`${i*150}ms`}}/>)}</div>
              </div>
            </div>
          )}
          <div ref={endRef}/>
        </div>

        {/* Voice feedback */}
        {voice.err&&<div className="mb-3 bg-red-500/10 border border-red-400/20 rounded-xl px-4 py-2 text-xs text-red-300 flex items-center gap-2"><span>⚠️</span>{voice.err}</div>}
        {voice.interim&&<div className="mb-2 bg-violet-500/10 border border-violet-400/20 rounded-xl px-3 py-2 text-xs text-violet-300 italic flex items-center gap-2"><span className="anim-bounce-soft">🎤</span>{voice.interim}…</div>}

        {/* Input bar */}
        <div className="flex gap-2 items-end">
          {voice.sup?(
            <button onPointerDown={voice.start} onPointerUp={voice.stop} onPointerLeave={voice.stop} onPointerCancel={voice.stop}
              style={{touchAction:'none'}}
              className={`flex-shrink-0 w-11 h-11 rounded-2xl flex items-center justify-center transition-all select-none
                ${voice.listening?'bg-red-500 text-white anim-bounce-soft':'glass border border-white/20 text-white/60 hover:bg-white/10'}`}>
              {voice.listening?'⏹':'🎤'}
            </button>
          ):(
            <button disabled className="flex-shrink-0 w-11 h-11 rounded-2xl flex items-center justify-center glass border border-white/10 text-white/20 cursor-not-allowed">🎤</button>
          )}
          <textarea value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey&&!typing){e.preventDefault();send(input);}}}
            placeholder={`Message ${companion.name}…${companion.scenario==='study'?' (try "I don\'t want to study today")':''}`}
            disabled={typing}
            rows={2} className="flex-1 resize-none glass border border-white/20 rounded-2xl px-4 py-3 text-sm text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-violet-500/50 transition-all bg-transparent disabled:opacity-50"/>
          <button onClick={()=>send(input)} disabled={!input.trim()||typing}
            className={`flex-shrink-0 w-11 h-11 rounded-2xl flex items-center justify-center text-white transition-all
              ${input.trim()&&!typing?`bg-gradient-to-r ${c.btnCls} shadow-md`:'bg-white/10 cursor-not-allowed text-white/30'}`}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        {!voice.sup&&<p className="text-center text-xs text-white/30 mt-2">Voice input is not supported in this browser. Please type instead.</p>}
      </div>

      {/* Right sidebar */}
      <div className="lg:w-80 xl:w-96 px-4 pb-6 lg:pt-6 space-y-4 flex-shrink-0">
        <AdaptiveModePanel result={lastResult} scenario={companion.scenario} typing={typing}/>
        {lastResult&&<div className="anim-slide-up"><MicroTaskPanel result={lastResult} onCheckIn={handleCheckIn}/></div>}
        <div className="glass rounded-2xl p-4 text-center">
          <p className="text-xs font-bold text-white/30 uppercase tracking-widest mb-2">Multimodal Interaction</p>
          <div className="flex justify-center gap-3 text-sm">
            <span className={input.length>0?'text-white font-bold':'text-white/20'}>💬 Type</span>
            <span className={voice.listening?'text-red-400 font-bold':'text-white/20'}>🎤 Speak</span>
            <span className="text-white/30">👁️ See</span>
          </div>
        </div>
        {lastResult&&(
          <button onClick={onViewMemory} className={`w-full py-3 rounded-2xl text-white font-bold text-sm shadow-lg bg-gradient-to-r ${c.btnCls} anim-slide-up`}>
            View Memory & Summary →
          </button>
        )}
      </div>
    </div>
  );
}

/* =================================================================
   PAGE 5b — Video Companion Mode (ACG flagship)
   ================================================================= */
function VideoCompanionMode({companion,onChatMode,onViewMemory,messages,onAdd,onResult,lastResult}){
  const [speaking,setSpeaking]=useState(false);
  const [subtitle,setSubtitle]=useState('');
  const [showSub,setShowSub]=useState(false);
  const [pendingVoicePlay,setPendingVoicePlay]=useState(null);
  const [voiceStatus,setVoiceStatus]=useState('');
  const [autoPlay,setAutoPlay]=useState(true);
  const [activeVideo,setActiveVideo]=useState(COMPANION_IDLE_VIDEO);
  const [videoLabel,setVideoLabel]=useState('Idle Loop');
  const [videoError,setVideoError]=useState(false);
  const [holdReplyVideo,setHoldReplyVideo]=useState(false);
  const videoRef=useRef(null);
  const currentState=getCompanionStateInfo(lastResult?.companion_state);
  const runtimeFallback=Boolean(lastResult?.fallback_used);

  const onVoice=useCallback(t=>{
    // In video mode, auto-send after voice transcript
    if(t.trim()) handleSend(t.trim());
  },[]);
  const voice=useVoiceInput(onVoice);

  useEffect(()=>{
    const video=videoRef.current;
    if(!video) return;
    video.currentTime=0;
    video.volume=0;
    video.muted=true;
    const playPromise=video.play();
    if(playPromise&&playPromise.catch){
      playPromise.catch(()=>{
        setVoiceStatus('Video autoplay paused. Tap the video to resume; text chat still works.');
      });
    }
  },[activeVideo,speaking]);

  const retryVideoPlayback=()=>{
    const video=videoRef.current;
    if(!video) return;
    video.muted=true;
    const playPromise=video.play();
    if(playPromise&&playPromise.catch){
      playPromise.catch(()=>setVoiceStatus('Video playback is unavailable. Text chat still works.'));
    }
  };

  // Play welcome in video mode
  useEffect(()=>{
    if(messages.length===0){
      const welcome=`Hi, I'm ${companion.name}. I'm here with you. Speak to me, or tap the mic below.`;
      onAdd({id:'c-welcome',role:'companion',content:welcome,ts:Date.now()});
      if(autoPlay) playReply(welcome,'idle');
    }
  },[]);

  const playIdleLoop=()=>{
    setSpeaking(false);
    setHoldReplyVideo(false);
    setVoiceStatus('');
    setActiveVideo(COMPANION_IDLE_VIDEO);
    setVideoLabel('Idle Loop');
    setTimeout(()=>setShowSub(false),2000);
  };

  const playReply=(text,state='thinking')=>{
    const nextVideo=getCompanionVideo(state);
    setSpeaking(true);
    setSubtitle('');
    setShowSub(true);
    setVideoError(false);
    setHoldReplyVideo(true);
    setPendingVoicePlay(null);
    setVoiceStatus('Preparing Fish voice...');
    setVideoLabel(nextVideo.split('/').pop().replace(/\.[^.]+$/,''));
    setActiveVideo(nextVideo);
    speakText(text,playIdleLoop,{
      onLoading:()=>{
        setVoiceStatus('Preparing Fish voice...');
      },
      onReady:(playVoice)=>{
        setPendingVoicePlay(()=>playVoice);
        setVoiceStatus('Voice ready. If your browser stays silent, tap Play voice.');
      },
      onPlaying:()=>{
        setVoiceStatus('Fish voice is playing...');
      },
      onBlocked:(playVoice)=>{
        setPendingVoicePlay(()=>playVoice);
        setVoiceStatus('Browser blocked autoplay. Tap Play voice.');
        setSubtitle('Audio did not start automatically.');
        setShowSub(true);
      },
      onError:()=>{
        setPendingVoicePlay(null);
        setVoiceStatus('Fish voice failed. Check /api/tts.');
        setSubtitle('Fish voice failed. Please check /api/tts.');
        setShowSub(true);
        playIdleLoop();
      }
    });
  };

  const handleSend=async text=>{
    if(!text.trim()) return;
    const userMessage=text.trim();
    setSubtitle(`You: ${userMessage}`); setShowSub(true);
    onAdd({id:`u-${Date.now()}`,role:'user',content:userMessage,ts:Date.now()});
    await new Promise(r=>setTimeout(r,600));
    const res=await generateChatResult(companion,userMessage,'stage',messages);
    const assistantText=getAssistantText(res);
    console.info('[nextstep_render]', {build_marker:BUILD_MARKER, surface:'stage', final_assistantText:assistantText, answer:res.answer, reply:res.reply});
    const cMsg={id:`c-${Date.now()}`,role:'companion',content:assistantText,mode:res.mode,ts:Date.now()};
    onAdd(cMsg);
    onResult(res,userMessage);
    playReply(assistantText,res.companion_state);
  };

  const [inputText,setInputText]=useState('');

  return(
    <div className="min-h-screen flex flex-col video-bg relative overflow-hidden">
      {/* Ambient particles */}
      {[...Array(8)].map((_,i)=>(
        <div key={i} className="absolute w-1 h-1 rounded-full bg-violet-400/40 pointer-events-none"
          style={{left:`${10+i*11}%`,bottom:'10%',animation:`particleDrift ${3+i*0.7}s ease-out infinite`,animationDelay:`${i*0.8}s`,'--dx':`${(i%2===0?1:-1)*15}px`}}/>
      ))}

      {/* Top bar */}
      <div className="flex items-center justify-between px-6 pt-6 pb-4 z-10 relative">
        <button onClick={onChatMode} className="glass rounded-xl px-4 py-2 text-sm text-white/60 hover:text-white transition-colors border border-white/10">
          ← Chat Mode
        </button>
        <div className="flex items-center gap-2 glass rounded-full px-3 py-1.5 border border-violet-400/20">
          <span className="w-1.5 h-1.5 rounded-full bg-violet-400 anim-bounce-soft"/>
          <span className="text-xs font-semibold text-violet-300">Video Companion Mode · {currentState.label}</span>
        </div>
        <button onClick={onViewMemory} className="glass rounded-xl px-4 py-2 text-sm text-white/60 hover:text-white transition-colors border border-white/10">
          Memory →
        </button>
      </div>

      {/* Main character stage */}
      <div className="flex-1 flex flex-col items-center justify-end relative z-10 px-4">
        <div className="w-full max-w-md" style={{height:'65vh',position:'relative'}}>
          <div className="w-full h-full flex items-center justify-center relative acg-stage">
            <div className="absolute inset-0 pointer-events-none" style={{background:'radial-gradient(ellipse 65% 55% at 50% 80%,rgba(124,58,237,0.24) 0%,transparent 72%)'}}/>
            {!videoError ? (
              <video
                ref={videoRef}
                key={activeVideo}
                src={activeVideo}
                autoPlay
                loop={!speaking||holdReplyVideo}
                muted
                playsInline
                preload="auto"
                onEnded={()=>{if(!holdReplyVideo) playIdleLoop();}}
                onClick={retryVideoPlayback}
                onError={()=>{setVideoError(true);setVoiceStatus('Video asset unavailable. Showing a static companion; text chat still works.');}}
                className="relative z-10 h-full max-h-full max-w-full rounded-3xl object-contain shadow-2xl border border-violet-300/20"
                style={{filter:`drop-shadow(0 0 ${speaking?'44px':'24px'} ${speaking?'rgba(139,92,246,0.72)':'rgba(139,92,246,0.42)'})`}}
              />
            ) : (
              <button onClick={()=>{setVideoError(false);setActiveVideo(COMPANION_IDLE_VIDEO);}} className="relative z-10 h-full w-full flex flex-col gap-4 items-center justify-center rounded-3xl border border-violet-300/20 bg-violet-500/10 text-8xl">
                {companion.emoji}
                <span className="text-xs font-bold text-violet-100">Video unavailable. Tap to retry the idle loop.</span>
              </button>
            )}
            <div className="absolute top-4 left-1/2 -translate-x-1/2 z-20 glass rounded-full px-3 py-1 text-xs font-bold text-violet-100 border border-violet-300/20">
              {speaking ? `Playing ${videoLabel}` : 'Idle loop'}
            </div>
            {speaking&&(
              <div className="absolute bottom-6 left-1/2 -translate-x-1/2 z-20 flex gap-1 items-end h-8">
                {[0,1,2,3,4].map(i=><div key={i} className="wave-bar" style={{animationDelay:`${i*0.1}s`}}/>)}
              </div>
            )}
          </div>
        </div>

        {/* Companion name tag */}
        <div className="flex items-center gap-2 mb-4 glass rounded-full px-4 py-2 border border-white/10">
          <span>{currentState.emoji}</span>
          <span className="text-sm font-black text-white">{companion.name}</span>
          <span className="text-xs text-white/40">·</span>
          <span className="text-xs text-white/50">{companion.type}</span>
          {lastResult&&<><span className="text-xs text-white/40">·</span><span className={`text-xs font-semibold ${runtimeFallback?'text-amber-300':'text-green-300'}`}>{runtimeFallback?'Runtime fallback':(lastResult.runtime_source||'openai')}</span></>}
          {speaking&&<span className="text-xs font-bold text-violet-300 flex items-center gap-1"><span className="w-1.5 h-1.5 rounded-full bg-violet-400 anim-bounce-soft"/>Speaking…</span>}
        </div>

        {runtimeFallback&&(
          <div className="mb-4 rounded-xl border border-amber-400/30 bg-amber-500/10 px-3 py-2 text-xs font-semibold text-amber-100">
            {getRuntimeFallbackMessage(lastResult)}
          </div>
        )}

        {/* Subtitle */}
        <div className={`w-full max-w-lg min-h-14 mb-4 text-center px-4 transition-all duration-300 ${showSub?'opacity-100':'opacity-0'}`}>
          {subtitle&&(
            <p className="glass rounded-2xl px-4 py-3 text-sm text-white/85 font-medium leading-relaxed border border-white/10 inline-block max-w-full">
              {subtitle}
            </p>
          )}
          {voiceStatus&&(
            <p className="mt-2 text-xs font-semibold text-violet-200/80">
              {voiceStatus}
            </p>
          )}
          {pendingVoicePlay&&(
            <button
              onClick={()=>{const play=pendingVoicePlay;setVoiceStatus('Fish voice is playing...');play();}}
              className="mt-3 rounded-full bg-violet-500 px-5 py-2 text-xs font-black text-white shadow-lg hover:bg-violet-400 transition-colors"
            >
              🔊 Play voice
            </button>
          )}
        </div>

        {/* Controls */}
        <div className="flex flex-col items-center gap-4 pb-8 w-full max-w-xs">
          {/* Mic button */}
          {voice.sup ? (
            <button onPointerDown={voice.start} onPointerUp={voice.stop} onPointerLeave={voice.stop} onPointerCancel={voice.stop}
              style={{touchAction:'none'}}
              className={`w-16 h-16 rounded-full flex items-center justify-center text-2xl shadow-2xl transition-all select-none
                ${voice.listening
                  ? 'bg-red-500 scale-110 shadow-red-500/50 anim-glow-pulse'
                  : 'glass border-2 border-violet-400/50 text-white hover:scale-105 hover:border-violet-400'}`}>
              {voice.listening?'⏹':'🎤'}
            </button>
          ):(
            <button disabled className="w-16 h-16 rounded-full flex items-center justify-center text-2xl glass border border-white/10 text-white/20 cursor-not-allowed">🎤</button>
          )}

          <p className="text-xs text-white/40 text-center">
            {voice.listening ? 'Listening… speak now' : speaking ? 'Companion is speaking…' : 'Speak to your companion'}
          </p>

          {/* Voice error fallback */}
          {voice.err&&<p className="text-xs text-red-300/80 text-center bg-red-500/10 border border-red-400/20 rounded-xl px-3 py-2">{voice.err}</p>}

          {/* Text input fallback */}
          <div className="flex gap-2 w-full">
            <input value={inputText} onChange={e=>setInputText(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'){handleSend(inputText);setInputText('');}}}
              placeholder="Or type here…"
              className="flex-1 glass border border-white/10 rounded-xl px-3 py-2 text-sm text-white placeholder-white/30 focus:outline-none focus:ring-1 focus:ring-violet-500/40 bg-transparent"/>
            <button onClick={()=>{handleSend(inputText);setInputText('');}} disabled={!inputText.trim()||speaking}
              className={`px-3 py-2 rounded-xl text-white text-xs font-bold transition-all ${inputText.trim()&&!speaking?`bg-gradient-to-r ${COMPANIONS[companion.scenario].btnCls}`:'bg-white/10 text-white/30'}`}>
              Send
            </button>
          </div>
        </div>
      </div>

      {/* Last adaptive mode — small bottom-right indicator */}
      {lastResult&&(
        <div className="absolute bottom-4 right-4 glass rounded-xl p-3 text-xs max-w-48 z-20 border border-white/10">
          <p className="text-white/30 font-bold uppercase tracking-wider mb-1">Mode</p>
          <p className="text-violet-300 font-semibold">{lastResult.mode}</p>
          <p className="text-white/60 mt-1 font-semibold">{currentState.emoji} {currentState.label}</p>
          <p className="text-white/30 mt-1 text-[10px] leading-tight">{lastResult.detected_state}</p>
        </div>
      )}
    </div>
  );
}

/* =================================================================
   PAGE 6 — Memory / Result

              <h3 className="text-xl font-black text-white">{companion.name}</h3>

            </div>

            </span>
          </div>

              <div key={l} className="bg-white/5 rounded-2xl p-4 border border-white/10">

                <p className="text-sm font-semibold text-white/80">{v}</p>

          <div className="space-y-2 mb-5">
            {tasks.map((task,i)=>(
              <div key={i} className="flex items-center gap-3 bg-white/5 rounded-xl px-4 py-2.5 border border-white/10">
                <span className="w-6 h-6 rounded-full bg-white/10 text-white/60 text-xs font-black flex items-center justify-center flex-shrink-0">{i+1}</span>

                <span className="ml-auto text-xs font-bold text-white/30">{task.duration_minutes}m</span>
              </div>
            ))}
          </div>
          <div className="bg-blue-500/10 border border-blue-400/20 rounded-xl p-4">
            <p className="text-xs font-bold text-blue-300/60 uppercase tracking-widest mb-1">💌 Check-in</p>
            <p className="text-sm text-blue-200/80 font-medium">{lastResult.check_in_message}</p>
          </div>

        {/* Memory — relational */}

            </div>
          )}
        </div>

        {/* AI Journey */}
        <div className="glass rounded-3xl p-6 border border-white/10">
          <p className="text-xs font-bold text-white/30 uppercase tracking-widest mb-5 text-center">🧭 AI-Native Journey — Completed</p>
          <div className="flex flex-wrap items-center justify-center gap-1">
            {['AI-Generated\nCompanion','AI-Detected\nIntent','Adaptive\nMode Switch','AI Micro-\nAction','Memory\nUpdated'].map((s,i)=>(
              <React.Fragment key={s}>
                <div className="flex flex-col items-center gap-1">
                  <div className="w-9 h-9 rounded-full bg-violet-500/30 border border-violet-400/40 text-violet-300 text-lg flex items-center justify-center">✓</div>
                  <span className="text-xs text-white/40 font-medium text-center whitespace-pre-line leading-tight">{s}</span>
                </div>
                {i<4&&<span className="text-white/15 font-bold text-xl mx-1 mb-4">→</span>}
              </React.Fragment>
            ))}
          </div>
        </div>

        <SameEngineTable/>
        <div className="py-2"><AlignmentBadges/></div>

        {/* CTA buttons */}
        <div className="grid grid-cols-2 gap-3 pt-2">
          <button onClick={onVideoMode} className={`py-4 rounded-2xl font-bold text-white text-sm shadow-lg bg-gradient-to-r ${c.btnCls} col-span-2 hover:shadow-xl`}>🎬 Return to Video Mode</button>
          <button onClick={onChatMode} className="py-3 rounded-2xl font-bold text-white text-sm glass border border-white/20 hover:bg-white/10 transition-all">💬 Chat Mode</button>
          <button onClick={onHome} className="py-3 rounded-2xl font-bold text-white text-sm glass border border-white/20 hover:bg-white/10 transition-all">← Home</button>
          <button onClick={onTryAnother} className="col-span-2 py-3 rounded-2xl font-bold text-white text-sm glass border border-white/20 hover:bg-white/10 transition-all">Try Another Scenario →</button>
        </div>
      </div>
    </div>
  );
}

/* =================================================================
   APP — State machine
   (selectedImageUrl persists through ALL pages)
   ================================================================= */
function App(){
  const [step,setStep]=useState('scenario');
  const [scenario,setScenario]=useState(null);
  // ── Setup profile (tone + role + use_case)
  const [setupProfile,setSetupProfile]=useState(null);
  // ── Image continuity
  const [selectedImageUrl,setSelectedImageUrl]=useState(null);
  const [selectedImagePreview,setSelectedImagePreview]=useState(null);
  const [selectedDefaultMeta,setSelectedDefaultMeta]=useState(null);
  const [companion,setCompanion]=useState(null);
  const [messages,setMessages]=useState([]);
  const [lastResult,setLastResult]=useState(null);
  const [memory,setMemory]=useState(null);
  const [currentViewMode,setCurrentViewMode]=useState('chat');
  const selectedImageUrlRef=useRef(null);

  const replaceSelectedImageUrl=url=>{
    const previous=selectedImageUrlRef.current;
    if(previous&&previous.startsWith('blob:')&&previous!==url) URL.revokeObjectURL(previous);
    selectedImageUrlRef.current=url;
    setSelectedImageUrl(url);
  };

  useEffect(()=>()=>{const url=selectedImageUrlRef.current;if(url&&url.startsWith('blob:')) URL.revokeObjectURL(url);},[]);

  const reset=()=>{
    runtimeSessionId=null;
    localActiveSubject='';
    localActiveIntent='general_chat';
    setStep('scenario');setScenario(null);setSetupProfile(null);
    replaceSelectedImageUrl(null);setSelectedImagePreview(null);setSelectedDefaultMeta(null);
    setCompanion(null);setMessages([]);setLastResult(null);setMemory(null);
  };

  const onSelect=s=>{setScenario(s);setStep('setup');};

  const onSetupComplete=profile=>{
    setSetupProfile(profile);
    setStep('upload');
  };

  const onGenerate=(imageUrl,imgBase64,defaultMeta)=>{
    replaceSelectedImageUrl(imageUrl);
    setSelectedImagePreview(imgBase64);
    setSelectedDefaultMeta(defaultMeta||null);
    setStep('progress');
  };

  const onProgressDone=()=>{
    runtimeSessionId=null;
    localActiveSubject='';
    localActiveIntent='general_chat';
    const defaultProfile = scenario==='study' && selectedDefaultMeta
      ? DEFAULT_OBJECT_COMPANIONS[selectedDefaultMeta.id] || {}
      : {};
    const defaultAsset=selectedDefaultMeta?.assetUrl||defaultProfile.assetUrl||null;
    const displayImage=selectedImageUrl||selectedImagePreview||defaultAsset||null;
    const profile={
      ...COMPANIONS[scenario],
      ...defaultProfile,
      sourceImageUrl:displayImage,
      sourceImageKind:(selectedImageUrl||selectedImagePreview)?'uploaded':(defaultAsset?'builtin':'none'),
      modelAssetUrl:scenario==='acg'?ACG_MODEL_PATH:null,
      visualMode:scenario==='acg'?'live2d':(selectedImageUrl||selectedImagePreview?'uploaded-image':(defaultAsset?'default-companion-art':'pseudo-3d')),
      default_object_id:selectedDefaultMeta?.id||'',
      default_object_label:selectedDefaultMeta?.label||defaultProfile.default_object_label||'',
      // Stamp setup profile onto companion
      ...(setupProfile?{tone:setupProfile.tone,use_case:setupProfile.use_case,role:setupProfile.role}:{}),
    };
    setCompanion(profile);
    setMessages([]);setLastResult(null);setMemory(null);
    setStep('companion');
  };

  // onResult now receives the actual userMessage directly to avoid stale state
  const onResult=(res,userMessage)=>{
    setLastResult(res);
    setMemory(previous=>({
      ...(previous||{}),
      ...(res.memory||{}),
      current_companion:companion?.name||'',
      last_goal:userMessage||res.memory?.last_goal||res.memory?.recent_goals?.[0]||'Start a session',
      preferred_interaction_mode:currentViewMode==='video'?'Voice + Video Mode':'Text + Voice Chat',
      recent_mode:res.mode||res.memory?.recent_mode,
      memory_update:res.memory_update||res.memory?.latest_memory_update||res.memory?.memory_update,
    }));
  };

  const safeMem=memory||{current_companion:companion?.name||'',last_goal:'Starting a session',preferred_interaction_mode:'Voice-based',recent_mode:lastResult?.mode||'Companion Mode',memory_update:'First session.'};
  const safeRes=lastResult||{reply:'',detected_state:'Ready',mode:'Companion Mode',micro_task:['Start a session'],check_in_message:'Take it one step at a time.',memory_update:'New session started.'};

  const progress={scenario:'0%',setup:'12%',upload:'28%',progress:'44%',companion:'58%',chat:'76%',video:'76%',result:'100%'}[step]||'0%';

  return(
    <div className="min-h-screen">
      {step!=='scenario'&&(
        <div className="fixed top-0 left-0 right-0 z-50 h-0.5 bg-white/10">
          <div className="h-full bg-gradient-to-r from-amber-400 via-orange-500 to-rose-500 transition-all duration-500" style={{width:progress}}/>
        </div>
      )}

      {step==='scenario'&&<ScenarioSelector onSelect={onSelect}/>}
      {step==='setup'&&scenario&&(
        <SetupPage onComplete={onSetupComplete} onBack={()=>setStep('scenario')}/>
      )}
      {step==='upload'&&scenario&&(
        <ImageUpload scenario={scenario} onGenerate={onGenerate} onBack={()=>setStep('setup')}/>
      )}
      {step==='progress'&&scenario&&(
        <GenerationProgress scenario={scenario} sourceImg={selectedImagePreview||selectedImageUrl} onDone={onProgressDone}/>
      )}
      {step==='companion'&&companion&&(
        <CompanionCardPage companion={companion}
          onChatMode={()=>{setCurrentViewMode('chat');setStep('chat');}}
          onVideoMode={()=>{setCurrentViewMode('video');setStep('video');}}
          onBack={()=>setStep('upload')}/>
      )}
      {step==='chat'&&companion&&(
        <ChatInterface companion={companion} messages={messages}
          onAdd={m=>setMessages(p=>[...p,m])} onResult={onResult} lastResult={lastResult}
          onViewMemory={()=>setStep('result')}
          onVideoMode={()=>{setCurrentViewMode('video');setStep('video');}}/>
      )}
      {step==='video'&&companion&&(
        <VideoCompanionMode companion={companion} messages={messages}
          onAdd={m=>setMessages(p=>[...p,m])} onResult={onResult} lastResult={lastResult}
          onChatMode={()=>{setCurrentViewMode('chat');setStep('chat');}}
          onViewMemory={()=>setStep('result')}/>
      )}
      {step==='result'&&companion&&(
        <MemoryResult companion={companion} lastResult={safeRes} memory={safeMem}
          onHome={reset} onTryAnother={reset}
          onVideoMode={()=>{setCurrentViewMode('video');setStep('video');}}
          onChatMode={()=>{setCurrentViewMode('chat');setStep('chat');}}/>
      )}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
