const LOW_KW = ['tired','procrastinat','study','exam','finance','boring','hard','difficult',"can't","cannot",'stressed','overwhelm','lazy','stuck','hate','ugh','not feeling',"don't feel","don't want","do not want"];
const FOCUS_KW = ['focus','concentrate','ready',"let's go","let go",'start','begin','work'];

function generateChatResult(scenario, msg) {
  if (scenario === 'study') {
    const lower = msg.toLowerCase();
    if (LOW_KW.some(k => lower.includes(k))) return STUDY_RESULTS.low;
    if (FOCUS_KW.some(k => lower.includes(k))) return STUDY_RESULTS.focus;
    return STUDY_RESULTS.default;
  }
  if (scenario === 'acg') return ACG_RESULT;
  return PET_RESULT;
}

function normalizeRuntimeTone(companion) {
  const tone = `${companion?.tone || ''} ${companion?.interaction_style || ''}`.toLowerCase();
  if (tone.includes('short') || tone.includes('direct')) return 'short_direct';
  if (tone.includes('coach')) return 'coach_like';
  if (tone.includes('friend')) return 'friend_like';
  if (tone.includes('cute') || tone.includes('playful')) return 'cute_playful';
  return 'soft_supportive';
}

function normalizeRuntimeUseCase(scenario, companion) {
  const useCase = `${companion?.use_case || ''} ${companion?.type || ''}`.toLowerCase();
  if (useCase.includes('work')) return 'work';
  if (useCase.includes('emotional') || useCase.includes('support')) return 'light_support';
  if (useCase.includes('pet') || useCase.includes('companionship')) return 'pet_companionship';
  if (useCase.includes('routine') || useCase.includes('reminder') || useCase.includes('check-in')) return 'routine';
  return scenario === 'pet' ? 'pet_companionship' : scenario === 'acg' ? 'light_support' : 'study';
}

function buildRuntimeCompanionPayload(companion) {
  if (!companion) return undefined;
  return {
    name: companion.name,
    type: companion.type,
    scenario: companion.scenario,
    emoji: companion.emoji,
    personality: companion.personality,
    tone: companion.tone,
    use_case: companion.use_case,
    backstory: companion.backstory,
    interaction_style: companion.interaction_style,
  };
}

async function generateChatResultAsync(scenario, msg, companion) {
  const localFallback = async () => {
    await new Promise(r => setTimeout(r, 900));
    return generateChatResult(scenario, msg);
  };

  if (window.location.protocol === 'file:') return localFallback();

  try {
    if (window.__NEXTSTEP_RUNTIME_SCENARIO !== scenario) {
      window.__NEXTSTEP_RUNTIME_SESSION_ID = null;
      window.__NEXTSTEP_RUNTIME_SCENARIO = scenario;
    }

    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id: window.__NEXTSTEP_RUNTIME_SESSION_ID || undefined,
        scenario,
        message: msg,
        channel: 'text',
        tone: normalizeRuntimeTone(companion),
        use_case: normalizeRuntimeUseCase(scenario, companion),
        companion: buildRuntimeCompanionPayload(companion),
      }),
    });
    if (!response.ok) throw new Error(`Runtime API failed: ${response.status}`);
    const result = await response.json();
    if (result.session_id) window.__NEXTSTEP_RUNTIME_SESSION_ID = result.session_id;
    if (!Array.isArray(result.micro_task) && Array.isArray(result.micro_task_plan)) {
      result.micro_task = result.micro_task_plan.map(task => task.label);
    }
    return result;
  } catch (err) {
    console.warn('[Runtime API] Falling back to local mock engine:', err);
    return localFallback();
  }
}

// FIX 2 — STABLE SESSION VOICE LOCK
// Voice is locked once per browser tab. All speakText() calls reuse
// the same _sessionVoice — prevents voice changing between messages.
// ═══════════════════════════════════════════════════════════════════

function resetRuntimeSession() {
  if (typeof window === 'undefined') return;
  window.__NEXTSTEP_RUNTIME_SESSION_ID = null;
  window.__NEXTSTEP_RUNTIME_SCENARIO = null;
}

const PREFERRED_VOICE_NAMES = [
  'Microsoft Jenny','Microsoft Aria','Samantha',
  'Google US English','Google UK English Female',
  'Karen','Moira','Tessa',
];
const VOICE_CONFIG = {
  acg:   { rate:0.92, pitch:1.18, volume:1.0 },
  study: { rate:0.95, pitch:1.00, volume:1.0 },
  pet:   { rate:0.95, pitch:1.12, volume:1.0 },
};

let _sessionVoice = null;
let _voiceInited  = false;

function pickBestVoice() {
  try {
    const voices = window.speechSynthesis.getVoices();
    if (!voices.length) return null;
    for (const name of PREFERRED_VOICE_NAMES) {
      const v = voices.find(v => v.lang.startsWith('en') && v.name.includes(name));
      if (v) return v;
    }
    return voices.find(v => v.lang.startsWith('en') &&
      (v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('natural')))
      ?? voices.find(v => v.lang.startsWith('en'))
      ?? voices[0]
      ?? null;
  } catch { return null; }
}

function initVoiceSession(scenario = 'acg') {
  if (!isTTSSupported() || _voiceInited) return;
  const tryLock = () => {
    _sessionVoice = pickBestVoice();
    _voiceInited  = true;
    window.speechSynthesis.onvoiceschanged = null;
    console.log('[Voice] Locked:', _sessionVoice?.name ?? 'default');
  };
  const voices = window.speechSynthesis.getVoices();
  if (voices.length > 0) tryLock();
  else {
    window.speechSynthesis.onvoiceschanged = tryLock;
    setTimeout(() => { if (!_voiceInited) tryLock(); }, 600);
  }
}

function resetVoiceSession() { _sessionVoice = null; _voiceInited = false; }
function getLockedVoiceName() { return _voiceInited ? (_sessionVoice?.name ?? 'browser default') : 'not yet initialized'; }
function isTTSSupported() { return typeof window !== 'undefined' && 'speechSynthesis' in window; }

function speakText(text, scenario = 'acg', onEnd) {
  if (!isTTSSupported()) { onEnd?.(); return; }
  try {
    window.speechSynthesis.cancel();
    const cfg = VOICE_CONFIG[scenario] ?? VOICE_CONFIG.acg;
    const u   = new SpeechSynthesisUtterance(text);
    u.rate = cfg.rate; u.pitch = cfg.pitch; u.volume = cfg.volume;
    if (!_voiceInited) initVoiceSession(scenario);
    if (_sessionVoice) u.voice = _sessionVoice;
    if (onEnd) { u.onend = () => { try { onEnd(); } catch {} }; u.onerror = () => { try { onEnd(); } catch {} }; }
    window.speechSynthesis.speak(u);
  } catch(err) { console.warn('[Voice] speakText error:', err); onEnd?.(); }
}

function stopSpeaking() { if (isTTSSupported()) try { window.speechSynthesis.cancel(); } catch {} }
function isSpeaking() { if (!isTTSSupported()) return false; try { return window.speechSynthesis.speaking; } catch { return false; } }

// VOICE INPUT HOOK
// ═══════════════════════════════════════════════════════════════════

function useVoiceInput(onTranscript) {
  const [isListening,       setIsListening]       = useState(false);
  const [interimTranscript, setInterimTranscript] = useState('');
  const [error,             setError]             = useState('');
  const recogRef = useRef(null);

  const isSupported = typeof window !== 'undefined' &&
    ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window);

  const startListening = useCallback(() => {
    if (!isSupported || isListening) return;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recog = new SpeechRecognition();
    recog.continuous = false;
    recog.interimResults = true;
    recog.lang = 'en-US';
    recog.onstart  = () => { setIsListening(true); setError(''); };
    recog.onend    = () => { setIsListening(false); setInterimTranscript(''); };
    recog.onerror  = (e) => { setError(`Mic error: ${e.error}`); setIsListening(false); };
    recog.onresult = (e) => {
      let interim = '', final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) final += e.results[i][0].transcript;
        else interim += e.results[i][0].transcript;
      }
      setInterimTranscript(interim);
      if (final) { onTranscript(final.trim()); setInterimTranscript(''); }
    };
    recogRef.current = recog;
    try { recog.start(); } catch(err) { setError('Could not start mic.'); }
  }, [isSupported, isListening, onTranscript]);

  const stopListening = useCallback(() => {
    try { recogRef.current?.stop(); } catch {}
    setIsListening(false);
  }, []);

  return { isListening, interimTranscript, startListening, stopListening, error, isSupported };
}

const ACG_PARAM_EYE_L = 'ParamEyeLOpen';
const ACG_PARAM_EYE_R = 'ParamEyeROpen';

function AnimatedSvgFallback({ speaking }) {
  return (
    <div className="relative w-full h-full flex items-end justify-center overflow-hidden">
      <div className="absolute inset-0 pointer-events-none"
        style={{ background:'radial-gradient(ellipse 60% 70% at 50% 80%,rgba(124,58,237,.3) 0%,transparent 70%)' }} />
      <div
        className={speaking ? 'animate-pulse' : ''}
        style={{
          filter:`drop-shadow(0 0 ${speaking?'40px':'20px'} rgba(139,92,246,${speaking?.85:.55}))`,
          animation: speaking ? undefined : 'fallbackFloat 3.5s ease-in-out infinite',
        }}
        dangerouslySetInnerHTML={{ __html: LUMI_SVG }}
      />
      {speaking && (
        <div className="absolute bottom-6 left-1/2 flex gap-1 items-end h-8" style={{ transform:'translateX(-50%)' }}>
          {[0,1,2,3,4].map(i => (
            <div key={i} style={{
              width:'3px', height:`${[12,22,30,22,12][i]}px`,
              background:'#a78bfa', borderRadius:'99px',
              animation:'waveBar .6s ease-in-out infinite', animationDelay:`${i*.1}s`
            }} />

function Live2DStage({ speaking, showDebug = false }) {
  const wrapRef    = useRef(null);
  const canvasRef  = useRef(null);
  const live2dRef  = useRef(null);
  const [status, setStatus] = useState('idle');   // idle|checking|loading|ready|failed
  const [errMsg, setErrMsg] = useState('');

  // ── Load model ─────────────────────────────────────────────────
  useEffect(() => {
    let cancelled = false;
    async function init() {
      const modelUrl = ACG_MODEL_PATH;
      console.log('[Live2D] Init. Model URL:', modelUrl);

      // Step 1: Check PIXI globals
      if (typeof window.PIXI === 'undefined') {
        const m = 'PIXI global not found — pixi.js CDN script failed to load.';
        console.error('[Live2D]', m); setErrMsg(m); setStatus('failed'); return;
      }
      if (!window.PIXI.live2d) {
        const m = 'PIXI.live2d not found. Likely: live2dcubismcore.min.js CDN failed (check Network tab).';
        console.error('[Live2D]', m); setErrMsg(m); setStatus('failed'); return;
      }
      console.log('[Live2D] PIXI.live2d available ✓');

      // Step 2: HEAD pre-flight
      setStatus('checking');
      try {
        const probe = await fetch(modelUrl, { method:'HEAD' });
        if (!probe.ok) throw new Error(`HTTP ${probe.status} for ${modelUrl} — place files at ./models/peter/`);
        console.log('[Live2D] model3.json reachable ✓');
      } catch(e) {
        const m = e instanceof Error ? e.message : `Fetch failed for ${modelUrl}. Use a local server (not file://).`;
        console.error('[Live2D] Pre-flight failed:', m);
        setErrMsg(m); setStatus('failed'); return;
      }
      if (cancelled) return;

      // Step 3: Create PIXI app + load model
      setStatus('loading');
      try {
        const canvas  = canvasRef.current;
        const wrapper = wrapRef.current;
        const W = wrapper.clientWidth  || 400;
        const H = wrapper.clientHeight || 600;
        const app = new window.PIXI.Application({
          view:canvas, transparent:true, autoStart:true,
          width:W, height:H,
          resolution: window.devicePixelRatio || 1,
          autoDensity: true,
        });
        console.log('[Live2D] Loading model…');
        const model = await window.PIXI.live2d.Live2DModel.from(modelUrl);
        if (cancelled) { app.destroy(true); return; }
        const scale = Math.min(W / model.width, H / model.height) * 0.88;
        model.scale.set(scale);
        model.anchor.set(0.5, 0.5);
        model.x = W / 2;
        model.y = H * 0.50;
        app.stage.addChild(model);
        live2dRef.current = { app, model };
        console.log('[Live2D] Ready ✓');
        setStatus('ready');
      } catch(e) {
        const m = e instanceof Error ? e.message : `Unknown error loading ${modelUrl}`;
        console.error('[Live2D] Load error:', m, e);
        if (!cancelled) { setErrMsg(m); setStatus('failed'); }
      }
    }
    init();
    return () => {
      cancelled = true;
      if (live2dRef.current) { live2dRef.current.app.destroy(true); live2dRef.current = null; }
    };
  }, []);

  // ── Mouth animation ───────────────────────────────────────────
  useEffect(() => {
    if (!live2dRef.current) return;
    const { model } = live2dRef.current;
    let raf;
    if (speaking) {
      let t = 0;
      const tick = () => {
        t += 0.18;
        const v = Math.max(0, Math.sin(t) * .5 + .5);
        try { model.internalModel.coreModel.setParameterValueById(ACG_PARAM_MOUTH, v); } catch {}
        raf = requestAnimationFrame(tick);
      };
      raf = requestAnimationFrame(tick);
    } else {
      try { model.internalModel.coreModel.setParameterValueById(ACG_PARAM_MOUTH, 0); } catch {}
    }
    return () => { if (raf) cancelAnimationFrame(raf); };
  }, [speaking]);

  // ── Eye blink ──────────────────────────────────────────────────
  useEffect(() => {
    if (status !== 'ready') return;
    const iv = setInterval(() => {
      const m = live2dRef.current?.model; if (!m) return;
      try { m.internalModel.coreModel.setParameterValueById(ACG_PARAM_EYE_L, 0); m.internalModel.coreModel.setParameterValueById(ACG_PARAM_EYE_R, 0); } catch {}
      setTimeout(() => {
        try { m.internalModel.coreModel.setParameterValueById(ACG_PARAM_EYE_L, 1); m.internalModel.coreModel.setParameterValueById(ACG_PARAM_EYE_R, 1); } catch {}
      }, 150);
    }, 3500 + Math.random() * 2000);
    return () => clearInterval(iv);
  }, [status]);

  const ready  = status === 'ready';
  const failed = status === 'failed';
  const color  = ready ? 'border-green-500/40 bg-green-950/60' : failed ? 'border-red-500/40 bg-red-950/60' : 'border-yellow-500/40 bg-yellow-950/60';
  const icon   = ready ? '✅' : failed ? '❌' : '⏳';

  return (
    <div ref={wrapRef} className="relative w-full h-full overflow-hidden">
      <canvas ref={canvasRef} style={{ display:ready?'block':'none', width:'100%', height:'100%' }} />
      {!ready && <AnimatedSvgFallback speaking={speaking} />}
      {ready && speaking && (
        <div className="absolute inset-0 pointer-events-none rounded-xl"
          style={{ animation:'glowPulse 1.8s ease-in-out infinite' }} />
      )}
      {ready && speaking && (
        <div className="absolute bottom-6 left-1/2 flex gap-1 items-end h-8 z-20" style={{ transform:'translateX(-50%)' }}>
          {[0,1,2,3,4].map(i=>(
            <div key={i} style={{ width:'3px',height:`${[12,22,30,22,12][i]}px`, background:'#a78bfa', borderRadius:'99px',
              animation:'waveBar .6s ease-in-out infinite', animationDelay:`${i*.1}s` }} />
          ))}
        </div>
      )}
      {showDebug && (
        <div className={`absolute bottom-3 left-3 right-3 z-40 rounded-xl border p-3 text-xs font-mono backdrop-blur-md ${color}`}>
          <p className="text-white/80 font-bold mb-1">{icon} Live2D — {status.toUpperCase()}</p>
          <p className="text-white/50 break-all"><span className="text-white/70">Model: </span>{ACG_MODEL_PATH}</p>
          {ready  && <p className="text-green-400 mt-0.5">Model rendered successfully ✓</p>}
          {failed && <p className="text-red-300 mt-0.5 break-all">{errMsg}</p>}
          {(status==='checking'||status==='loading') && <p className="text-yellow-300 mt-0.5 animate-pulse">{status==='checking'?'Checking model file…':'Loading model…'}</p>}
          {failed && <p className="text-white/40 mt-1 text-[10px]">Fix: place files at <code className="text-yellow-300">./models/peter/</code> and serve via HTTP</p>}
        </div>
      )}
      {failed && !showDebug && (
        <div className="absolute bottom-3 left-3 right-3 z-40 rounded-xl border border-red-500/30 bg-black/60 p-3 text-xs text-red-300 backdrop-blur-md">
          ⚠ Live2D failed — using SVG fallback<br/>
          <span className="text-white/40 text-[10px] break-all">{errMsg}</span>
        </div>
      )}
      <style>{`
        @keyframes glowPulse {
          0%,100%{box-shadow:0 0 40px rgba(139,92,246,.4),inset 0 0 20px rgba(139,92,246,.08)}
          50%{box-shadow:0 0 80px rgba(139,92,246,.7),inset 0 0 50px rgba(139,92,246,.18)}
        }
      `}</style>
    </div>
  );
}

function Pseudo3DPreview({ companion, size = 'md' }) {
  const [mx, setMx] = useState(0);
  const [my, setMy] = useState(0);
  const [hov, setHov] = useState(false);

  const gradMap = { study:'from-amber-300 via-orange-300 to-yellow-200', acg:'from-violet-300 via-purple-300 to-indigo-200', pet:'from-rose-300 via-pink-300 to-red-200' };
  const glowMap = { study:'rgba(251,191,36,.5)', acg:'rgba(167,139,250,.5)', pet:'rgba(251,113,133,.5)' };
  const ringMap = { study:'ring-amber-300/50', acg:'ring-violet-300/50', pet:'ring-rose-300/50' };
  const sizeMap = { sm:{container:'w-28 h-36',avatar:'text-4xl'}, md:{container:'w-48 h-60',avatar:'text-6xl'}, lg:{container:'w-60 h-72',avatar:'text-7xl'} };

  const g = gradMap[companion.scenario] || gradMap.study;
  const glow = glowMap[companion.scenario] || glowMap.study;
  const ring = ringMap[companion.scenario] || ringMap.study;
  const sz = sizeMap[size];

  return (
    <div className="flex flex-col items-center gap-3" style={{ perspective:'800px' }}>
      <div className={`relative ${sz.container} cursor-pointer select-none`}
        style={{
          transformStyle:'preserve-3d',
          transition: hov?'transform .1s ease-out':'transform .4s ease-out',
          transform: hov ? `rotateX(${my}deg) rotateY(${mx}deg) scale(1.04)` : 'rotateX(3deg) rotateY(0deg)',
          animation: hov ? 'none' : 'float 4s ease-in-out infinite',
        }}
        onMouseMove={e=>{const r=e.currentTarget.getBoundingClientRect();setMx(((e.clientX-r.left)/r.width-.5)*20);setMy(-(((e.clientY-r.top)/r.height)-.5)*20);}}
        onMouseEnter={()=>setHov(true)}
        onMouseLeave={()=>{setHov(false);setMx(0);setMy(0);}}>
        <div className={`absolute inset-0 rounded-3xl bg-gradient-to-br ${g} ring-4 ${ring} overflow-hidden`}
          style={{ boxShadow:`0 20px 60px ${glow},0 8px 32px rgba(0,0,0,.15)` }}>
          <div className="absolute inset-0 opacity-30 pointer-events-none"
            style={{ background:'linear-gradient(135deg,rgba(255,255,255,.6) 0%,transparent 50%,rgba(255,255,255,.1) 100%)' }} />
          <div className="relative z-10 h-full flex flex-col items-center justify-center gap-2 px-4">
            <div className={`${sz.avatar} mb-1 drop-shadow-lg`} style={{ transform:'translateZ(10px)' }}>
              {companion.imageUrl
                ? <img src={companion.imageUrl} alt="" className="w-24 h-24 rounded-full object-cover" />
                : (companion.emoji || '✨')
              }
            </div>
            <div className="text-white font-black text-lg text-center drop-shadow" style={{ transform:'translateZ(8px)' }}>
              {companion.name}
            </div>
            <div className="bg-white/40 backdrop-blur-sm text-white/90 font-semibold px-3 py-1 rounded-full text-xs text-center" style={{ transform:'translateZ(5px)' }}>
              {companion.type}
            </div>
            <div className="flex flex-wrap justify-center gap-1 mt-1" style={{ transform:'translateZ(3px)' }}>
              {(companion.personality||[]).slice(0,2).map(t => (
                <span key={t} className="bg-white/30 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">{t}</span>
              ))}
            </div>
          </div>
          <div className="absolute top-3 right-3 text-white/60 text-xs">✦</div>
          <div className="absolute bottom-3 left-3 text-white/40 text-xs">✦</div>
        </div>
        <div className={`absolute inset-0 rounded-3xl bg-gradient-to-br ${g} opacity-30`}
          style={{ transform:'translateZ(-12px) translateY(8px) scale(.97)', filter:'blur(12px)' }} />
      </div>
      <div className="flex gap-1 items-center">
        {[0,1,2].map(i=><div key={i} className="w-1.5 h-1.5 rounded-full bg-gray-300 animate-bounce-soft" style={{ animationDelay:`${i*200}ms` }}/>)}
      </div>

    </div>
  );
}

function ImageUpload({ scenario, onGenerate, onBack }) {
  const [selImg,  setSelImg]  = useState(null);
  const [selDef,  setSelDef]  = useState(null);
  const [drag,    setDrag]    = useState(false);
  const [loading, setLoading] = useState(false);
  const fileRef = useRef(null);
  const meta = SCENARIO_META.find(s => s.id === scenario);
  const colors = {
    study:{ gradient:'from-amber-50 to-orange-50', btn:'bg-gradient-to-r from-amber-400 to-orange-500 hover:from-amber-500 hover:to-orange-600', border:'border-amber-200 hover:border-amber-400', ring:'ring-amber-300' },
    acg:  { gradient:'from-violet-50 to-purple-50', btn:'bg-gradient-to-r from-violet-400 to-purple-500 hover:from-violet-500 hover:to-purple-600', border:'border-violet-200 hover:border-violet-400', ring:'ring-violet-300' },
    pet:  { gradient:'from-rose-50 to-pink-50', btn:'bg-gradient-to-r from-rose-400 to-pink-500 hover:from-rose-500 hover:to-pink-600', border:'border-rose-200 hover:border-rose-400', ring:'ring-rose-300' },
  }[scenario];

  const handleFile = (file) => {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => { setSelImg(e.target.result); setSelDef(null); };
    reader.readAsDataURL(file);
  };
  const handleGenerate = async () => {
    setLoading(true);
    await new Promise(r => setTimeout(r, 1600));
    setLoading(false);
    onGenerate(selImg);
  };
  const hasSelection = selImg !== null || selDef !== null;

  return (
    <div className="min-h-screen flex flex-col items-center justify-center px-4 py-10">
      <div className="w-full max-w-xl animate-slide-up">
        <button onClick={onBack} className="flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-6 transition-colors">← Back</button>
        <div className={`bg-gradient-to-br ${colors.gradient} rounded-3xl p-7 border border-white/50 shadow-lg mb-6`}>
          <div className="flex items-center gap-3 mb-2">
            <span className="text-3xl">{meta.icon}</span>
            <div>
              <p className="text-xs font-bold text-gray-400 uppercase tracking-widest">Selected Scenario</p>
              <h2 className="text-xl font-bold text-gray-800">{meta.title}</h2>
            </div>
          </div>
          <p className="text-sm text-gray-500">{meta.description}</p>
        </div>
        <div
          className={`relative border-2 border-dashed rounded-3xl p-8 text-center transition-all duration-200 mb-6 bg-white/60 backdrop-blur-sm cursor-pointer
            ${drag ? `${colors.ring} ring-2 border-opacity-100` : colors.border}
          `}
          onDragOver={e=>{e.preventDefault();setDrag(true);}}
          onDragLeave={()=>setDrag(false)}
          onDrop={e=>{e.preventDefault();setDrag(false);handleFile(e.dataTransfer.files[0]);}}
          onClick={()=>fileRef.current?.click()}>
          <input ref={fileRef} type="file" accept="image/*" className="hidden"
            onChange={e=>{if(e.target.files?.[0])handleFile(e.target.files[0]);}} />
          {selImg ? (
            <div className="flex flex-col items-center gap-3">
              <img src={selImg} alt="Uploaded" className="w-32 h-32 object-cover rounded-2xl shadow-lg" />
              <p className="text-sm font-medium text-gray-600">Image selected ✓</p>
              <p className="text-xs text-gray-400">Click to change</p>
            </div>
          ) : (
            <div className="py-4">
              <div className="text-4xl mb-3">📁</div>
              <p className="text-sm font-semibold text-gray-600 mb-1">Upload your image</p>
              <p className="text-xs text-gray-400">Drag & drop or click to browse</p>
            </div>
          )}
        </div>
        <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 px-1">Or choose a default</p>
        <div className="grid grid-cols-3 gap-3 mb-6">
          {meta.defaultImages.map(img => (
            <button key={img.id} onClick={()=>{setSelDef(img.id);setSelImg(null);}}
              className={`flex flex-col items-center gap-2 p-4 rounded-2xl border-2 transition-all bg-white/70
                ${selDef===img.id ? `${colors.ring} ring-2 border-transparent shadow-md` : 'border-gray-100 hover:border-gray-200'}`}>
              <span className="text-3xl">{img.emoji}</span>
              <span className="text-xs font-medium text-gray-500">{img.label}</span>
              {selDef===img.id && <span className="text-xs font-bold text-green-500">✓</span>}
            </button>
          ))}
        </div>
        <button onClick={handleGenerate} disabled={!hasSelection||loading}
          className={`w-full py-4 rounded-2xl text-white font-bold text-base shadow-lg transition-all
            ${hasSelection&&!loading ? `${colors.btn} hover:shadow-xl hover:-translate-y-0.5` : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
          {loading ? (
            <span className="flex items-center justify-center gap-3">
              <span className="w-5 h-5 border-2 border-white/40 border-t-white rounded-full animate-spin"/>
              Turning your image into a companion...
            </span>
          ) : 'Generate Companion →'}
        </button>
      </div>
    </div>
  );
}

            <span className="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"/>AI-generated companion

                <div className="flex items-center gap-2 mb-1">
                  <span className="text-2xl">{companion.emoji}</span>
                  <h3 className="text-3xl font-black text-gray-800">{companion.name}</h3>

                  <span key={p} className={`text-xs font-semibold px-3 py-1 rounded-full border ${a.section}`}>{p}</span>
                ))}

            </Section>
            <Section icon="🗣️" label="Tone"><p className="text-sm text-gray-700 italic">"{companion.tone}"</p></Section>
            <Section icon="🎯" label="Use Case"><p className="text-sm text-gray-600 leading-relaxed">{companion.use_case}</p></Section>

            <Section icon="💬" label="Interaction Style"><p className="text-sm text-gray-500">{companion.interaction_style}</p></Section>

        <div className="mt-8 flex flex-col items-center gap-3">
          <button onClick={onStartChat}
            className={`px-10 py-4 rounded-2xl text-white font-bold text-lg shadow-xl transition-all hover:shadow-2xl hover:-translate-y-0.5 ${a.btn}`}>
            Start Chat with {companion.name} →
          </button>
          <p className="text-xs text-gray-400 flex items-center gap-2">
            <span>💬 Text</span><span>·</span><span>🎤 Voice</span><span>·</span><span>🎯 Adaptive Mode</span><span>·</span><span>📝 Memory</span>
          </p>
        </div>
      </div>
    </div>
  );
}

const MODE_COLORS = {
  'Encourage Mode':          { bg:'bg-amber-50 border-amber-200',   text:'text-amber-700',  dot:'bg-amber-400'  },
  'Focus Mode':              { bg:'bg-blue-50 border-blue-200',     text:'text-blue-700',   dot:'bg-blue-400'   },
  'Companion Mode':          { bg:'bg-violet-50 border-violet-200', text:'text-violet-700', dot:'bg-violet-400' },
  'Companion Presence Mode': { bg:'bg-violet-50 border-violet-200', text:'text-violet-700', dot:'bg-violet-400' },
  'Routine Check-in Mode':   { bg:'bg-rose-50 border-rose-200',     text:'text-rose-700',   dot:'bg-rose-400'   },
  'Check-in Mode':           { bg:'bg-teal-50 border-teal-200',     text:'text-teal-700',   dot:'bg-teal-400'   },
};
const DEFAULT_MODE = { bg:'bg-gray-50 border-gray-200', text:'text-gray-600', dot:'bg-gray-400' };
const SCENARIO_DEFAULT = {
  study:{ detected_state:'Awaiting input…',    mode:'Check-in Mode' },
  acg:  { detected_state:'Listening quietly…', mode:'Companion Presence Mode' },
  pet:  { detected_state:'Watching over you…', mode:'Routine Check-in Mode' },
};

function TaskSupportPanel({ result, scenario, isTyping }) {
  const [checked, setChecked] = useState({});
  const toggle = i => setChecked(p => ({ ...p, [i]:!p[i] }));
  const def = SCENARIO_DEFAULT[scenario];
  const data = result ?? { reply:'', detected_state:def.detected_state, mode:def.mode, micro_task:[], check_in_message:'', memory_update:'' };
  const ms = MODE_COLORS[data.mode] ?? DEFAULT_MODE;
  const doneCount = Object.values(checked).filter(Boolean).length;

  const Row = ({ label, children }) => (
    <div className="flex items-start gap-2">
      <span className="text-[10px] text-gray-400 font-semibold w-24 flex-shrink-0 pt-0.5 uppercase tracking-wide">{label}</span>
      <div className="flex items-center gap-1.5 flex-wrap">{children}</div>
    </div>
  );

  return (
    <div className="space-y-3">
      {/* 1 – Adaptive Mode Panel */}
      <div className={`rounded-2xl border ${ms.bg} p-4 shadow-sm`}>
        <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 flex items-center gap-1">
          <span>⚡</span> Adaptive Mode Panel
        </p>
        <div className="space-y-2.5">
          <Row label="Detected State">
            <span className={`w-2 h-2 rounded-full flex-shrink-0 ${isTyping?'animate-pulse':''} ${ms.dot}`}/>
            <span className="text-sm font-semibold text-gray-700">{isTyping?'Analyzing…':data.detected_state}</span>
          </Row>
          <Row label="Active Mode">
            <span className={`text-xs font-bold px-2.5 py-1 rounded-full border ${ms.bg} ${ms.text}`}>
              {isTyping?'…':data.mode}
            </span>
          </Row>
          {data.micro_task.length > 0 && !isTyping && (
            <Row label="Next Action">
              <span className="text-sm text-gray-600 font-medium leading-snug">{data.micro_task[0]}</span>
            </Row>
          )}
        </div>
      </div>

      {/* 2 – Micro-Task Support */}
      {data.micro_task.length > 0 && (
        <div className="rounded-2xl bg-white border border-gray-100 p-4 shadow-sm">
          <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 flex items-center gap-1">
            <span>🎯</span> Micro-Task Support
            {doneCount > 0 && (
              <span className="ml-auto bg-green-100 text-green-600 text-[10px] font-bold px-2 py-0.5 rounded-full border border-green-200">
                {doneCount}/{data.micro_task.length}
              </span>
            )}
          </p>
          <div className="space-y-2">
            {data.micro_task.map((task, i) => (
              <button key={i} onClick={() => toggle(i)}
                className={`w-full flex items-center gap-3 text-left p-2.5 rounded-xl transition-all
                  ${checked[i] ? 'bg-green-50 border border-green-100' : 'bg-gray-50 hover:bg-gray-100 border border-transparent'}`}>
                <span className={`w-5 h-5 rounded border-2 flex items-center justify-center flex-shrink-0 transition-all
                  ${checked[i] ? 'bg-green-400 border-green-400' : 'border-gray-300 bg-white'}`}>
                  {checked[i] && <span className="text-white text-xs font-black">✓</span>}
                </span>
                <span className={`text-sm font-medium leading-snug ${checked[i] ? 'text-green-600 line-through' : 'text-gray-700'}`}>{task}</span>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* 3 – Check-in */}
      {data.check_in_message && (
        <div className="rounded-2xl bg-gradient-to-br from-blue-50 to-indigo-50 border border-blue-100 p-4 shadow-sm">
          <p className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-2 flex items-center gap-1">
            <span>💌</span> Check-in
          </p>
          <p className="text-sm text-blue-700 font-medium leading-relaxed">{data.check_in_message}</p>
        </div>
      )}

      {/* 4 – Memory Updated */}
      {data.memory_update && result && (
        <div className="rounded-2xl bg-gradient-to-br from-purple-50 to-violet-50 border border-purple-100 p-4 shadow-sm">
          <p className="text-[10px] font-black text-purple-400 uppercase tracking-widest mb-2 flex items-center gap-1">
            <span>🧠</span> Memory Updated
          </p>
          <p className="text-sm text-purple-700 font-medium leading-relaxed italic">"{data.memory_update}"</p>
        </div>
      )}

      {/* Multimodal input status */}
      <div className="rounded-2xl bg-white/50 border border-gray-100 p-3">
        <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 text-center">Multimodal Input</p>
        <div className="flex justify-center gap-4 text-sm text-gray-400">

function ChatInterface({ companion, scenario, messages, onAddMessage, onChatResult, lastResult, onViewMemory, onVideoMode }) {
  const [inputText, setInputText]   = useState('');
  const [isTyping,  setIsTyping]    = useState(false);
  const [speakingId,setSpeakingId]  = useState(null);
  const [showDbg,   setShowDbg]     = useState(false);
  const endRef = useRef(null);
  const colors = {
    study:{ btn:'bg-gradient-to-r from-amber-400 to-orange-500 hover:from-amber-500 hover:to-orange-600', bubble:'bg-gradient-to-br from-amber-50 to-orange-50 border-amber-200', input:'focus:ring-amber-300' },
    acg:  { btn:'bg-gradient-to-r from-violet-500 to-purple-600 hover:from-violet-600 hover:to-purple-700', bubble:'bg-gradient-to-br from-violet-50 to-purple-50 border-violet-200', input:'focus:ring-violet-300' },
    pet:  { btn:'bg-gradient-to-r from-rose-400 to-pink-500 hover:from-rose-500 hover:to-pink-600', bubble:'bg-gradient-to-br from-rose-50 to-pink-50 border-rose-200', input:'focus:ring-rose-300' },
  }[scenario];

  const handleTranscript = useCallback(t => setInputText(t), []);
  const { isListening, interimTranscript, startListening, stopListening, error:voiceError, isSupported:voiceSupported } = useVoiceInput(handleTranscript);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior:'smooth' }); }, [messages, isTyping]);

  useEffect(() => {
    if (messages.length === 0) {
      const welcome = { study:`Hi! I'm ${companion.name} ☕ What are we working on today?`, acg:`Hello. I'm ${companion.name} ✨ I'm here with you. What's on your mind?`, pet:`Hey! ${companion.name} here 🐾 Ready for your check-in?` };
      onAddMessage({ id:'c-welcome', role:'companion', content:welcome[scenario], timestamp:new Date() });
    }
  }, []);

  const sendMessage = async (text) => {
    if (!text.trim()) return;
    onAddMessage({ id:`u-${Date.now()}`, role:'user', content:text.trim(), timestamp:new Date() });
    setInputText(''); setIsTyping(true);
    const result = await generateChatResultAsync(scenario, text.trim(), companion);
    setIsTyping(false);
    onAddMessage({ id:`c-${Date.now()}`, role:'companion', content:result.reply, timestamp:new Date() });
    onChatResult(result);
  };

  const handleSpeak = (msgId, text) => {
    if (speakingId === msgId) { stopSpeaking(); setSpeakingId(null); }
    else { speakText(text, scenario, () => setSpeakingId(null)); setSpeakingId(msgId); }
  };

  return (
    <div className="min-h-screen flex flex-col lg:flex-row">
      {/* ── Chat column ── */}
      <div className="flex-1 flex flex-col max-w-2xl mx-auto w-full px-4 py-6">
        {/* Header */}
        <div className="flex items-center gap-3 mb-5 bg-white/70 backdrop-blur-sm rounded-2xl p-4 shadow-sm border border-white/50">
          <div className="flex-shrink-0"><Pseudo3DPreview companion={companion} size="sm" /></div>
          <div className="flex-1 min-w-0">
            <h2 className="text-lg font-black text-gray-800 truncate">{companion.name}</h2>
            <p className="text-xs text-gray-500 truncate">{companion.type}</p>
            <div className="flex items-center gap-1.5 mt-1">
              <span className="w-2 h-2 rounded-full bg-green-400 animate-pulse"/>
              <span className="text-xs text-green-600 font-semibold">Online</span>
              {lastResult && <><span className="text-gray-300 mx-1">·</span><span className="text-xs text-gray-500">{lastResult.mode}</span></>}
            </div>
          </div>
          {onVideoMode && (
            <button onClick={onVideoMode}
              className={`flex-shrink-0 text-xs font-bold px-3 py-2 rounded-xl transition-all shadow-sm
                ${scenario==='acg' ? 'bg-gradient-to-r from-violet-500 to-purple-600 text-white hover:shadow-md' : 'text-gray-500 border border-gray-200 hover:bg-gray-50'}`}>
              🎬 Video Mode
            </button>
          )}
          <button onClick={onViewMemory}
            className="flex-shrink-0 text-xs font-bold text-gray-400 hover:text-gray-600 border border-gray-200 rounded-xl px-3 py-2 transition-colors hover:bg-gray-50">
            Memory →
          </button>
        </div>

        {/* Messages */}
        <div className="flex-1 overflow-y-auto space-y-4 mb-4 min-h-[320px] max-h-[440px] pr-1 scrollbar-hidden">
          {messages.map(msg => (
            <div key={msg.id} className={`flex ${msg.role==='user'?'justify-end':'justify-start'} animate-fade-in`}>
              {msg.role==='companion' && (
                <div className="w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 mr-2 mt-1 text-sm select-none">{companion.emoji}</div>
              )}
              <div className={`max-w-[80%] flex flex-col gap-1 ${msg.role==='user'?'items-end':'items-start'}`}>
                <div className={`px-4 py-3 rounded-2xl text-sm leading-relaxed shadow-sm
                  ${msg.role==='user' ? 'bg-gray-800 text-white rounded-tr-sm' : `${colors.bubble} border text-gray-800 rounded-tl-sm`}`}>
                  {msg.content}
                </div>
                {msg.role==='companion' && isTTSSupported() && (
                  <button onClick={() => handleSpeak(msg.id, msg.content)}
                    className={`text-xs flex items-center gap-1 px-2 py-0.5 rounded-full transition-colors
                      ${speakingId===msg.id ? 'bg-gray-200 text-gray-600 font-bold' : 'text-gray-400 hover:text-gray-600 hover:bg-gray-100'}`}>
                    {speakingId===msg.id ? '⏹ Stop' : '🔊 Play'}
                  </button>
                )}
              </div>
            </div>
          ))}
          {isTyping && (
            <div className="flex justify-start animate-fade-in">
              <div className="w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 mr-2 mt-1 text-sm">{companion.emoji}</div>
              <div className={`px-4 py-3 rounded-2xl ${colors.bubble} border shadow-sm`}>
                <div className="flex gap-1 items-center h-4">
                  {[0,1,2].map(i=><div key={i} className="w-2 h-2 rounded-full bg-gray-400 animate-bounce" style={{ animationDelay:`${i*150}ms` }}/>)}
                </div>
              </div>
            </div>
          )}
          <div ref={endRef} />
        </div>

        {voiceError && (
          <div className="mb-3 bg-red-50 border border-red-100 rounded-xl px-4 py-2 text-xs text-red-600 flex items-center gap-2">
            <span>⚠️</span>{voiceError}
          </div>
        )}
        {interimTranscript && (
          <div className="mb-2 bg-blue-50 border border-blue-100 rounded-xl px-3 py-2 text-xs text-blue-600 italic flex items-center gap-2">
            <span className="animate-pulse">🎤</span>{interimTranscript}…
          </div>
        )}

        {/* Input */}
        <div className="flex gap-2 items-end">
          {voiceSupported ? (
            <button onClick={isListening?stopListening:startListening}
              className={`flex-shrink-0 w-11 h-11 rounded-2xl flex items-center justify-center transition-all shadow-sm
                ${isListening ? 'bg-red-500 hover:bg-red-600 text-white animate-pulse' : 'bg-white border border-gray-200 text-gray-500 hover:bg-gray-50'}`}>
              {isListening ? '⏹' : '🎤'}
            </button>
          ) : (
            <button disabled className="flex-shrink-0 w-11 h-11 rounded-2xl flex items-center justify-center bg-gray-100 text-gray-400 cursor-not-allowed border border-gray-200">🎤</button>
          )}
          <textarea value={inputText} onChange={e=>setInputText(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage(inputText);}}}
            placeholder={`Message ${companion.name}…`} rows={2}
            className={`flex-1 resize-none bg-white/80 backdrop-blur-sm border border-gray-200 rounded-2xl px-4 py-3 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 ${colors.input} transition-all`}/>
          <button onClick={()=>sendMessage(inputText)} disabled={!inputText.trim()||isTyping}
            className={`flex-shrink-0 w-11 h-11 rounded-2xl flex items-center justify-center text-white shadow-md transition-all
              ${inputText.trim()&&!isTyping ? `${colors.btn} hover:shadow-lg` : 'bg-gray-200 cursor-not-allowed'}`}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>

        {showDbg && <p className="mt-2 text-[10px] text-gray-400 text-center">Voice locked: {getLockedVoiceName()}</p>}
        <button onClick={()=>setShowDbg(d=>!d)} className="mt-1 text-[10px] text-gray-300 hover:text-gray-500 text-center w-full transition-colors">
          {showDbg ? 'Hide debug' : '🔍 Debug'}
        </button>
      </div>

      {/* ── Right sidebar (FIX 4) ── */}
      <div className="lg:w-80 xl:w-96 px-4 pb-6 lg:pt-6 flex-shrink-0">
        <TaskSupportPanel result={lastResult} scenario={scenario} isTyping={isTyping} />
        {lastResult && (
          <button onClick={onViewMemory}
            className={`w-full mt-3 py-3 rounded-2xl text-white font-bold text-sm shadow-lg transition-all ${colors.btn}`}>
            View Memory & Summary →
          </button>
        )}
      </div>
    </div>
  );
}

function Particles() {

function VideoCompanionMode({ companion, scenario, messages, onAddMessage, onChatResult, lastResult, onChatMode, onViewMemory }) {
  const [convState,    setConvState]    = useState('idle');  // idle|listening|thinking|speaking
  const [subtitle,     setSubtitle]     = useState('');
  const [showSubtitle, setShowSubtitle] = useState(false);
  const [showManual,   setShowManual]   = useState(false);
  const [manualInput,  setManualInput]  = useState('');
  const [micStarted,   setMicStarted]   = useState(false);
  const [showDebug,    setShowDebug]    = useState(false);
  const processingRef = useRef(false);

  const showSub = useCallback((text, ms = 4000) => {
    setSubtitle(text); setShowSubtitle(true);
    setTimeout(() => setShowSubtitle(false), ms);
  }, []);

  const playReply = useCallback((text, onDone) => {
    setConvState('speaking');
    showSub(text, Math.max(3000, text.length * 60));
    speakText(text, scenario, () => { setConvState('listening'); onDone?.(); });
  }, [scenario, showSub]);

  const handleUserInput = useCallback(async (text) => {
    if (!text.trim() || processingRef.current) return;
    processingRef.current = true;
    stopSpeaking(); setConvState('thinking');
    showSub(`You: ${text}`, 2000);
    onAddMessage({ id:`u-${Date.now()}`, role:'user', content:text.trim(), timestamp:new Date() });
    await new Promise(r => setTimeout(r, 700));
    const result = await generateChatResultAsync(scenario, text.trim(), companion);
    onAddMessage({ id:`c-${Date.now()}`, role:'companion', content:result.reply, timestamp:new Date() });
    onChatResult(result);
    processingRef.current = false;
    playReply(result.reply);
  }, [scenario, onAddMessage, onChatResult, playReply, showSub]);

  const { isListening, interimTranscript, startListening, stopListening, error:micError, isSupported:micSupported } = useVoiceInput(handleUserInput);

  // Auto-start mic when entering listening state
  useEffect(() => {
    if (convState === 'listening' && micSupported && !isListening && !processingRef.current) {
      startListening();
    }
  }, [convState, micSupported, isListening, startListening]);

  // Initial welcome
  useEffect(() => {
    const welcomeMap = {
      acg:  `Hello, I'm ${companion.name}. I'm here with you. Speak when you're ready.`,
      study:`Hi! ${companion.name} here. Tell me what we're working on today.`,
      pet:  `Hey! ${companion.name} checking in. How are you feeling right now?`,
    };
    const welcome = welcomeMap[scenario];
    if (messages.length === 0) {
      onAddMessage({ id:'c-welcome', role:'companion', content:welcome, timestamp:new Date() });
    }
    const t = setTimeout(() => {
      if (isTTSSupported()) {
        playReply(messages.length === 0 ? welcome : `I'm here. Speak whenever you're ready.`);
      } else {
        setConvState('listening');
      }
      setMicStarted(true);
    }, 400);
    return () => clearTimeout(t);
  }, []);

  const handleMicToggle = () => {
    if (convState === 'speaking') { stopSpeaking(); setConvState('listening'); }
    else if (isListening) { stopListening(); setConvState('idle'); }
    else { setConvState('listening'); }
  };

  const handleManualSend = () => {
    if (!manualInput.trim()) return;
    handleUserInput(manualInput); setManualInput(''); setShowManual(false);
  };

  const speaking  = convState === 'speaking';
  const listening = convState === 'listening' || isListening;
  const statusLabel =
    convState === 'speaking' ? `${companion.name} is speaking…` :
    convState === 'thinking' ? 'Thinking…' :
    isListening              ? 'Listening…' :
    micStarted               ? 'Tap mic to speak' : 'Tap to start';

  return (
    <div className="fixed inset-0 flex flex-col overflow-hidden"
      style={{ background:'radial-gradient(ellipse 80% 60% at 50% 70%,rgba(88,28,235,.22) 0%,#0f0c29 70%)' }}>
      <Particles />

      {/* Top bar */}
      <div className="relative z-20 flex items-center justify-between px-6 pt-5 pb-3 flex-shrink-0">
        <button onClick={() => { stopSpeaking(); stopListening(); onChatMode(); }}
          className="text-sm text-white/50 hover:text-white transition-colors bg-white/8 backdrop-blur-md border border-white/10 rounded-xl px-4 py-2">
          ← Chat Mode
        </button>
        <div className="flex items-center gap-2 bg-white/8 backdrop-blur-md rounded-full px-3 py-1.5 border border-violet-400/20">
          <span className="w-2 h-2 rounded-full bg-violet-400 animate-pulse" />
          <span className="text-xs font-semibold text-violet-300">Video Companion Mode</span>
        </div>
        <button onClick={() => { stopSpeaking(); stopListening(); onViewMemory(); }}
          className="text-sm text-white/50 hover:text-white transition-colors bg-white/8 backdrop-blur-md border border-white/10 rounded-xl px-4 py-2">
          Memory →
        </button>
      </div>

      {/* Character stage */}
      <div className="flex-1 relative flex flex-col items-center justify-end z-10 min-h-0">
        <div className="w-full max-w-lg" style={{ height:'62vh', position:'relative' }}>
          {scenario === 'acg' ? (
            <Live2DStage speaking={speaking} showDebug={showDebug} />
          ) : (
            <SimpleCharacterDisplay companion={companion} speaking={speaking} />
          )}
        </div>
      </div>

      {/* Subtitle */}
      <div className="relative z-20 flex-shrink-0 px-6 pb-2 min-h-[56px] flex items-center justify-center">
        {showSubtitle && subtitle && (
          <div className="max-w-xl text-center text-white/90 text-sm leading-relaxed px-5 py-3 rounded-2xl"
            style={{ background:'rgba(0,0,0,.55)', backdropFilter:'blur(12px)', border:'1px solid rgba(255,255,255,.1)', animation:'subtitleFade .3s ease-out both' }}>
            {subtitle}
          </div>
        )}
      </div>

      {/* Status + interim */}
      <div className="relative z-20 flex-shrink-0 flex flex-col items-center gap-1 px-6 pb-3">
        <div className="flex items-center gap-2">
          {listening && <WaveBars active color="#a78bfa" />}
          <span className={`text-xs font-semibold ${
            convState==='speaking' ? 'text-violet-300' :
            listening              ? 'text-green-300' :
            convState==='thinking' ? 'text-yellow-300' : 'text-white/40'
          }`}>{statusLabel}</span>
        </div>
        {interimTranscript && <p className="text-xs text-white/50 italic animate-pulse">{interimTranscript}…</p>}
        {micError && <p className="text-xs text-red-400">{micError}</p>}
      </div>

      {/* Mic control */}
      <div className="relative z-20 flex-shrink-0 flex flex-col items-center gap-3 pb-8 px-6">
        <button onClick={handleMicToggle} disabled={convState==='thinking'}
          className="relative w-20 h-20 rounded-full flex items-center justify-center transition-all duration-200 shadow-2xl disabled:opacity-40"
          style={{
            background: listening ? 'linear-gradient(135deg,#ef4444,#dc2626)'
                       : speaking ? 'linear-gradient(135deg,#7c3aed,#4f46e5)'
                       : 'rgba(255,255,255,.12)',
            border:'2px solid rgba(255,255,255,.2)',
            boxShadow: listening ? '0 0 0 12px rgba(239,68,68,.15),0 8px 32px rgba(0,0,0,.4)' : '0 8px 32px rgba(0,0,0,.4)',
          }}>
          <span className="text-3xl select-none">
            {convState==='thinking' ? '⏳' : convState==='speaking' ? '🔊' : listening ? '⏹' : '🎤'}
          </span>
          {listening && <span className="absolute inset-0 rounded-full border-2 border-red-400/50 animate-ping" />}
        </button>

        <div className="flex items-center gap-4">
          {!showManual && (
            <button onClick={() => setShowManual(true)} className="text-xs text-white/30 hover:text-white/60 transition-colors">
              ⌨️ Type instead
            </button>
          )}
          <button onClick={() => setShowDebug(d=>!d)} className="text-xs text-white/20 hover:text-white/50 transition-colors">
            {showDebug ? '🔕 Hide debug' : '🔍 Debug'}
          </button>
          {showDebug && <span className="text-[10px] text-violet-400/60">Voice: {getLockedVoiceName()}</span>}
        </div>

        {showManual && (
          <div className="flex gap-2 w-full max-w-sm">
            <input value={manualInput} onChange={e=>setManualInput(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter')handleManualSend();}}
              placeholder={`Message ${companion.name}…`}
              className="flex-1 bg-white/10 border border-white/20 rounded-2xl px-4 py-2.5 text-sm text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-violet-400/50"
              autoFocus />
            <button onClick={handleManualSend} disabled={!manualInput.trim()||convState==='thinking'}
              className="px-4 py-2.5 rounded-2xl bg-violet-600 text-white text-sm font-bold disabled:opacity-40">→</button>
            <button onClick={() => setShowManual(false)} className="px-3 py-2.5 rounded-2xl bg-white/10 text-white/60 text-sm">✕</button>
          </div>
        )}
      </div>

      <TaskMiniOverlay result={lastResult} />
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// PAGE 5 — MEMORY & RESULT
// ═══════════════════════════════════════════════════════════════════

function MemoryResult({ companion, scenario, lastResult, memory, onHome, onTryAnother }) {
  const accentMap = {
    study:{ gradient:'from-amber-400 to-orange-500', card:'from-amber-50 to-orange-50 border-amber-200' },
    acg:  { gradient:'from-violet-400 to-purple-500', card:'from-violet-50 to-purple-50 border-violet-200' },
    pet:  { gradient:'from-rose-400 to-pink-500', card:'from-rose-50 to-pink-50 border-rose-200' },
  };
  const a = accentMap[scenario] || accentMap.study;
  const MField = ({ icon, label, value }) => (
    <div className="bg-white/60 rounded-2xl p-4 border border-white/50">
      <p className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1 flex items-center gap-1"><span>{icon}</span>{label}</p>
      <p className="text-sm font-semibold text-gray-700">{value}</p>
    </div>
  );
  const SameEngineRows = [
    { cap:'Persona generation', study:'Cappu ☕', acg:'Lumi ✨', pet:'Mochi 🐾' },
    { cap:'Intent detection',   study:'Low motivation', acg:'Seeking support', pet:'Routine check-in' },
    { cap:'Active mode',        study:'Encourage Mode', acg:'Companion Mode', pet:'Check-in Mode' },
    { cap:'Memory update',      study:'Study rhythm', acg:'Break style', pet:'Daily routine' },
  ];
  return (
    <div className="min-h-screen px-4 py-10">
      <div className="max-w-3xl mx-auto space-y-6 animate-slide-up">
        <div className="text-center mb-2">
          <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Session Complete</p>
          <h2 className="text-3xl font-black text-gray-800 mb-2">Memory & Summary</h2>
          <p className="text-sm text-gray-500">Here's what {companion.name} remembered from your session.</p>
        </div>
        <div className={`bg-gradient-to-br ${a.card} border rounded-3xl p-6 shadow-lg`}>
          <div className="flex items-center gap-4 mb-5">
            <span className="text-4xl">{companion.emoji}</span>
            <div>
              <h3 className="text-xl font-black text-gray-800">{companion.name}</h3>
              <p className="text-sm text-gray-500">{companion.type}</p>
            </div>
            <span className={`ml-auto inline-block text-xs font-bold px-3 py-1.5 rounded-full text-white bg-gradient-to-r ${a.gradient}`}>{lastResult.mode}</span>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <MField icon="💬" label="Last Message"    value={memory.last_goal} />
            <MField icon="🔍" label="Detected State"  value={lastResult.detected_state} />
            <MField icon="⚡" label="Active Mode"     value={lastResult.mode} />
            <MField icon="⏱️" label="Preferred Style" value={memory.preferred_task_length} />
          </div>
        </div>
        <div className="bg-white/70 backdrop-blur-sm border border-gray-100 rounded-3xl p-6 shadow-sm">
          <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4 flex items-center gap-1.5"><span>🎯</span> Generated Micro-Tasks</p>
          <div className="space-y-2 mb-5">
            {lastResult.micro_task.map((task,i) => (
              <div key={i} className="flex items-center gap-3 bg-gray-50 rounded-xl px-4 py-2.5">
                <span className="w-6 h-6 rounded-full bg-gray-200 text-gray-600 text-xs font-black flex items-center justify-center flex-shrink-0">{i+1}</span>
                <span className="text-sm text-gray-700 font-medium">{task}</span>
              </div>
            ))}
          </div>
          <div className="bg-gradient-to-r from-blue-50 to-indigo-50 border border-blue-100 rounded-xl p-4">
            <p className="text-xs font-bold text-blue-400 uppercase tracking-widest mb-1 flex items-center gap-1"><span>💌</span> Check-in Message</p>
            <p className="text-sm text-blue-700 font-medium">{lastResult.check_in_message}</p>
          </div>
        </div>
        <div className="bg-gradient-to-br from-purple-50 to-violet-50 border border-purple-100 rounded-3xl p-6 shadow-sm">
          <p className="text-xs font-bold text-purple-400 uppercase tracking-widest mb-2 flex items-center gap-1.5"><span>🧠</span> Memory Update</p>
          <p className="text-base text-purple-800 font-semibold leading-relaxed italic">"{lastResult.memory_update}"</p>
        </div>
        <div className="bg-white/60 backdrop-blur-sm border border-white/50 rounded-3xl p-6 shadow-sm">
          <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4 text-center">🧭 AI-Native Journey — Completed</p>
          <div className="flex flex-wrap items-center justify-center gap-1">
            {['AI-Generated\nCompanion','AI-Detected\nIntent','Adaptive\nMode Switch','AI Micro-\nAction','Memory\nUpdated'].map((step,i) => (
              <React.Fragment key={step}>
                <div className="flex flex-col items-center gap-1">
                  <div className="w-9 h-9 rounded-full bg-green-400 text-white text-lg flex items-center justify-center shadow-sm">✓</div>
                  <span className="text-xs text-gray-500 font-medium text-center whitespace-pre-line leading-tight">{step}</span>
                </div>
                {i<4 && <span className="text-gray-200 font-bold text-xl mx-1 mb-4">→</span>}
              </React.Fragment>
            ))}
          </div>
        </div>
        <div className="bg-white/70 backdrop-blur-sm border border-gray-100 rounded-2xl overflow-hidden shadow-sm">
          <div className="bg-gray-50 px-4 py-3 border-b border-gray-100">
            <p className="text-xs font-bold text-gray-500 uppercase tracking-widest text-center">🔄 Same Engine, Multiple Companions</p>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead><tr className="border-b border-gray-100">
                <th className="text-left px-4 py-3 text-xs font-bold text-gray-400 uppercase">Capability</th>
                <th className="px-4 py-3 text-xs font-bold text-amber-600 uppercase">☕ Study</th>
                <th className="px-4 py-3 text-xs font-bold text-violet-600 uppercase">✨ ACG</th>
                <th className="px-4 py-3 text-xs font-bold text-rose-600 uppercase">🐾 Pet</th>
              </tr></thead>
              <tbody>{SameEngineRows.map((r,i) => (
                <tr key={r.cap} className={`border-b border-gray-50 ${i%2===0?'':'bg-gray-50/50'}`}>
                  <td className="px-4 py-3 text-xs font-semibold text-gray-500">{r.cap}</td>
                  <td className="px-4 py-3 text-xs text-center text-amber-700 font-medium">{r.study}</td>
                  <td className="px-4 py-3 text-xs text-center text-violet-700 font-medium">{r.acg}</td>
                  <td className="px-4 py-3 text-xs text-center text-rose-700 font-medium">{r.pet}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
        <div className="flex flex-wrap gap-2 justify-center py-2">
          {[
            { label:'AI-Native Journey', icon:'🧭', color:'bg-amber-50 border-amber-200 text-amber-700' },
            { label:'Adaptive Mode', icon:'⚡', color:'bg-blue-50 border-blue-200 text-blue-700' },
            { label:'Same Engine, Multiple Companions', icon:'🔄', color:'bg-violet-50 border-violet-200 text-violet-700' },
            { label:'Multimodal Interaction', icon:'🎙️', color:'bg-rose-50 border-rose-200 text-rose-700' },
            { label:'AI-assisted Build Workflow', icon:'🤖', color:'bg-teal-50 border-teal-200 text-teal-700' },
          ].map(b => (
            <span key={b.label} className={`inline-flex items-center gap-1.5 text-xs font-bold px-3 py-1.5 rounded-full border ${b.color}`}>
              <span>{b.icon}</span>{b.label}
            </span>
          ))}
        </div>
        <div className="flex flex-col sm:flex-row gap-3 pt-2">
          <button onClick={onHome} className="flex-1 py-4 rounded-2xl font-bold text-white shadow-lg bg-gradient-to-r from-gray-600 to-gray-700 hover:from-gray-700 hover:to-gray-800 transition-all hover:shadow-xl">
            ← Back to Home
          </button>
          <button onClick={onTryAnother}
            className={`flex-1 py-4 rounded-2xl font-bold text-white shadow-lg bg-gradient-to-r ${a.gradient} hover:shadow-xl transition-all hover:-translate-y-0.5`}>
            Try Another Scenario →
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// ROOT APP — STATE MACHINE & ROUTER
// ═══════════════════════════════════════════════════════════════════

function App() {
  const [step,       setStep]       = useState('scenario');   // scenario|upload|companion|chat|video|result
  const [scenario,   setScenario]   = useState(null);
  const [image,      setImage]      = useState(null);
  const [companion,  setCompanion]  = useState(null);
  const [messages,   setMessages]   = useState([]);
  const [lastResult, setLastResult] = useState(null);
  const [memory,     setMemory]     = useState(null);

  // FIX 2: Lock voice session on scenario select, reset on home
  useEffect(() => {
    if (scenario) initVoiceSession(scenario);
    else resetVoiceSession();
  }, [scenario]);

  const handleScenarioSelect = s => { setScenario(s); setStep('upload'); };

  const handleGenerate = async (imageUrl) => {
    resetRuntimeSession();
    setImage(imageUrl);
    const c = { ...COMPANIONS[scenario], imageUrl };
    setCompanion(c);
    setMessages([]); setLastResult(null); setMemory(null);
    setStep('companion');
  };

  const handleAddMessage = useCallback(msg => setMessages(prev => [...prev, msg]), []);

  const handleChatResult = useCallback((result) => {
    setLastResult(result);
    const lastUser = messages.filter(m => m.role==='user').slice(-1)[0];
    setMemory({
      current_companion: companion?.name ?? '',
      last_goal: lastUser?.content ?? 'Start a session',
      preferred_task_length: result.mode==='Encourage Mode' ? '10-minute sprint' : result.mode==='Routine Check-in Mode' ? 'Short breaks' : 'Flexible',
      recent_mode: result.mode,
      memory_update: result.memory_update,
    });
  }, [messages, companion]);

  const handleHome = useCallback(() => {
    resetRuntimeSession();
    setScenario(null); setImage(null); setCompanion(null);
    setMessages([]); setLastResult(null); setMemory(null);
    setStep('scenario');
  }, []);

  const safeMemory = memory ?? {
    current_companion: companion?.name ?? 'Companion',
    last_goal: 'Starting a session',
    preferred_task_length: '10-minute sprint',
    recent_mode: lastResult?.mode ?? 'Check-in Mode',
    memory_update: lastResult?.memory_update ?? 'First session — building baseline.',
  };
  const safeResult = lastResult ?? {
    reply:'', detected_state:'Ready', mode:'Check-in Mode',
    micro_task:['Start your session','Take it one step at a time'],
    check_in_message:'Let me know how it goes!',
    memory_update:'First session — building baseline.',
  };

  const progressWidth = step==='upload'?'20%':step==='companion'?'40%':step==='chat'?'65%':step==='result'?'100%':'0%';

  return (
    <div className="min-h-screen">
      {/* Progress bar (hidden in video mode) */}
      {step !== 'scenario' && step !== 'video' && (
        <div className="fixed top-0 left-0 right-0 z-50 h-1 bg-gray-100">
          <div className="h-full bg-gradient-to-r from-amber-400 via-orange-400 to-rose-400 transition-all duration-500"
            style={{ width:progressWidth }} />
        </div>
      )}

      {step === 'scenario' && (
        <ScenarioSelector onSelect={handleScenarioSelect} />
      )}

      {step === 'upload' && scenario && (
        <ImageUpload scenario={scenario} onGenerate={handleGenerate} onBack={() => setStep('scenario')} />
      )}

      {step === 'companion' && companion && (
        <CompanionCardPage companion={companion} onStartChat={() => setStep('chat')} onBack={() => setStep('upload')} />
      )}

      {step === 'chat' && companion && scenario && (
        <ChatInterface
          companion={companion} scenario={scenario}
          messages={messages} onAddMessage={handleAddMessage}
          onChatResult={handleChatResult} lastResult={lastResult}
          onViewMemory={() => setStep('result')}
          onVideoMode={() => setStep('video')}
        />
      )}

      {step === 'video' && companion && scenario && (
        <VideoCompanionMode
          companion={companion} scenario={scenario}
          messages={messages} onAddMessage={handleAddMessage}
          onChatResult={handleChatResult} lastResult={lastResult}
          onChatMode={() => setStep('chat')}
          onViewMemory={() => setStep('result')}
        />
      )}

      {step === 'result' && companion && scenario && (
        <MemoryResult
          companion={companion} scenario={scenario}
          lastResult={safeResult} memory={safeMemory}
          onHome={handleHome} onTryAnother={handleHome}
        />
      )}
    </div>
  );
}

// ── Boot ──────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
